@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>

d','Vatreni — the Blazers — punching miles above their weight since 1998'],'Uruguay':['Winners of the very first World Cup, on home soil in 1930','Suárez\'s bite, Ghiggia\'s goal, Cavani\'s bicycle kick — always dramatic','La Celeste — two stars, the founders, South America\'s oldest football nation'],'Morocco':['The first African and Arab nation to reach a World Cup semi-final','They knocked out Spain, Portugal and Belgium in the same tournament','The Atlas Lions of Qatar 2022 — the greatest underdog run in World Cup history'],'Switzerland':['Hosted and reached the semis in 1954, often forgotten in their own story','Quietly consistent — they\'ve reached the knockouts four times since 2006','The Nati — solid, disciplined, never flashy, almost never go home early'],'Norway':['Knocked Brazil out in 1998 with a famous Tore André Flo winner','The nation that produced Haaland and once beat the five-time champions','Viking blood, underdog spirit — and a striker the whole world is watching'],'Colombia':['Their 1994 campaign ended in tragedy — Escobar\'s own goal cost him everything','James Rodríguez won the golden boot in 2014 with one of the great tournament runs','Los Cafeteros — coffee, cumbia, and a quarter-final no one who watched will forget'],'Austria':['The Wunderteam of the 1930s were among the finest sides in the world','Reached the semi-finals in 1954 in the highest-scoring World Cup ever','Red and white, Alpine pride — hoping this generation can match the legends'],'Mexico':['Reached the last 16 seven consecutive times — the curse of the fifth game','El Tri hosted two World Cups and went out at the same stage every single time','The Azteca roar, Chicharito\'s goals — a nation completely consumed by football'],'Japan':['Co-hosts in 2002 who quietly became Asia\'s most consistent side','Shocked Germany and Spain in Qatar 2022 — no one saw it coming','The Samurai Blue have made every World Cup since 1998 without fail'],'South Korea':['Co-hosts in 2002 who reached const dl=ms=>new Promise(r=>setTimeout(r,ms));
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function autoInit(name){const w=(name||'').trim().split(/\s+/).filter(Boolean);return w.length>1?w.slice(0,2).map(x=>x[0]).join('').toUpperCase():(name||'??').substring(0,2).toUpperCase();}

function sv(){try{localStorage.setItem('wc26x',JSON.stringify({phase:S.phase,onboardScreen:S.onboardScreen,names:S.names,teamNames:S.teamNames,pins:S.pins,adminPin:S.adminPin,leaguePin:S.leaguePin,registrations:S.registrations||[],sh:S.sh,dr:S.dr,dp:S.dp,players:S.players,rules:S.rules,loggedIn:S.loggedIn,matches:S.matches,predictions:S.predictions,tab:S.tab}));}catch(e){}}
function init(){
  try{
    const raw=localStorage.getItem('wc26x');
    if(raw){
      const d=JSON.parse(raw);
      const players=d.players?d.players.map(p=>({
        ...p,kit:p.kit||{...DK},
        logo:{...DL,...(p.logo||{}),initials:p.logo?.initials||autoInit(p.teamName||p.name),initialsPos:p.logo?.initialsPos||'bottom',stars:p.logo?.stars||0,textColor:p.logo?.textColor||p.logo?.accent||'#ffd700'},
        boots:p.boots||'predator',bootC1:p.bootC1||(BOOTS.find(b=>b.id===(p.boots||'predator'))||BOOTS[0]).bg,bootC2:p.bootC2||(BOOTS.find(b=>b.id===(p.boots||'predator'))||BOOTS[0]).accent,
        teamName:p.teamName||`Team ${p.id+1}`,pin:p.pin||''
      })):null;
      Object.assign(S,{phase:d.phase||'setup',onboardScreen:d.onboardScreen||'home',names:d.names||S.names,teamNames:d.teamNames||S.teamNames,
        pins:d.pins||S.pins,adminPin:d.adminPin||'0260',leaguePin:d.leaguePin||'',registrations:d.registrations||[],sh:d.sh||null,dr:d.dr||0,dp:d.dp||0,players,
        rules:{...S.rules,...(d.rules||{})},loggedIn:d.loggedIn??null,tab:d.tab||'table',
        matches:d.matches||[],predictions:d.predictions||{}});
    }
  }catch(e){}
  // Reapply theme on refresh if logged in
  if(S.loggedIn!=null&&S.players?.[S.loggedIn]?.theme){
    applyTheme(S.players[S.loggedIn].theme);
  }
  render();
  initSupabase();
}

// ===== LOGO SVG =====
function logoSVG(logo={},size=80){
  const {shape='shield',bg='#cc0000',accent='#ffd700',textColor,symbol='⭐',initials='FC',initialsPos='bottom',stars=0}=logo;
  const tc=textColor||accent;
  let sh='';
  if(shape==='shield')sh=`<path d="M12,10 L88,10 L88,56 Q88,88 50,97 Q12,88 12,56 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='circle')sh=`<circle cx="50" cy="50" r="40" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='hexagon')sh=`<path d="M50,8 L86,29 L86,71 L50,92 L14,71 L14,29 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='diamond')sh=`<path d="M50,8 L92,50 L50,92 L8,50 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='pentagon')sh=`<path d="M50,8 L90,36 L75,86 L25,86 L10,36 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='oval')sh=`<ellipse cx="50" cy="50" rx="42" ry="34" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='crest')sh=`<path d="M50,8 L88,8 L88,52 Q88,76 68,86 Q59,91 50,94 Q41,91 32,86 Q12,76 12,52 L12,8 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='star')sh=`<path d="M50,6 L61,36 L93,36 L68,56 L77,88 L50,69 L23,88 L32,56 L7,36 L39,36 Z" fill="${bg}" stroke="${accent}" stroke-width="2.5"/>`;
  else if(shape==='arch')sh=`<path d="M12,12 Q12,8 50,6 Q88,8 88,12 L88,68 Q88,90 50,96 Q12,90 12,68 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='badge')sh=`<path d="M50,7 L84,20 L88,56 Q86,80 50,96 Q14,80 12,56 L16,20 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;

  // Safe zones per shape — inset from stroke
  const cy=50;
  // Bottom initials y — well inset from bottom edge
  const ib={shield:88,circle:86,hexagon:86,diamond:84,pentagon:82,oval:78,crest:88,star:82,arch:88,badge:88}[shape]||84;
  // Top initials y
  const it={shield:22,circle:20,hexagon:20,diamond:22,pentagon:16,oval:26,crest:20,star:16,arch:18,badge:18}[shape]||20;
  // Horizontal safe zone for split-h — generous inset
  const lx={shield:28,circle:26,hexagon:28,diamond:36,pentagon:28,oval:26,crest:26,star:34,arch:26,badge:28}[shape]||28;
  const rx={shield:76,circle:74,hexagon:72,diamond:64,pentagon:72,oval:74,crest:74,star:66,arch:74,badge:72}[shape]||72;

  const iStr=(initials||'').toUpperCase().substring(0,4);
  // Scale font size down for longer initials and narrow shapes
  const baseFontSize=iStr.length<=2?11:iStr.length===3?9.5:8.5;
  const narrowShapes=['diamond','star'];
  const fs=narrowShapes.includes(shape)?baseFontSize-1.5:baseFontSize;

  let initEls='';
  if(iStr){
    if(initialsPos==='bottom'){
      initEls=`<text x="50" y="${ib}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr)}</text>`;
    }else if(initialsPos==='top'){
      initEls=`<text x="50" y="${it}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr)}</text>`;
    }else if(initialsPos==='split-v'){
      const h=Math.ceil(iStr.length/2);
      initEls=`<text x="50" y="${it}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr.substring(0,h))}</text><text x="50" y="${ib}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr.substring(h))}</text>`;
    }else if(initialsPos==='split-h'){
      const h=Math.ceil(iStr.length/2);
      const hfs=fs-0.5;
      initEls=`<text x="${lx}" y="${cy+4}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${hfs}" fill="${tc}">${esc(iStr.substring(0,h))}</text><text x="${100-lx}" y="${cy+4}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${hfs}" fill="${tc}">${esc(iStr.substring(h))}</text>`;
    }
  }

  const symbolEl=symbol?`<text x="50" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="${iStr&&(initialsPos==='split-v'||initialsPos==='bottom'||initialsPos==='top')?22:26}">${symbol}</text>`:'';

  const starCount=Math.min(+stars||0,5);
  const starH=starCount>0?18:0;
  const totalH=100+starH;
  const starsEl=starCount>0?`<text x="50" y="${starH-3}" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="${tc}" letter-spacing="3">${'★'.repeat(starCount)}</text>`:'';
  return `<svg viewBox="0 0 100 ${totalH}" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${Math.round(size*(totalH/100))}" style="overflow:visible">${starsEl}<g transform="translate(0,${starH})">${sh}${symbolEl}${initEls}</g></svg>`;
}

// ===== PREDICTIONS =====
function hasPendingPreds(pid){
  if(pid===null||!S.matches.length)return false;
  const now=Date.now();
  return S.matches.some(m=>{
    const upcoming=!m.kickoff||new Date(m.kickoff).getTime()>now;
    const noResult=m.hScore==null;
    const noPred=!S.predictions[pid]?.[m.id];
    return upcoming&&noResult&&noPred;
  });
}
function isLocked(m){return m.hScore!=null||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now());}
function setPred(pid,mid,h,a){
  if(!S.predictions[pid])S.predictions[pid]={};
  S.predictions[pid][mid]={h:+h,a:+a};sv();
  savePredToSB(pid,mid,+h,+a);
}
function addMatch(){
  const hEl=document.getElementById('mh'),aEl=document.getElementById('ma'),dEl=document.getElementById('md'),tEl=document.getElementById('mt');
  if(!hEl||!aEl)return;
  const home=hEl.value,away=aEl.value;
  if(!home||!away||home===away){alert('Pick two different teams.');return;}
  const kickoff=dEl?.value&&tEl?.value?`${dEl.value}T${tEl.value}`:null;
  S.matches.push({id:'m'+Date.now(),home,away,homeF:ALL_TEAMS.find(t=>t.n===home)?.f||'',awayF:ALL_TEAMS.find(t=>t.n===away)?.f||'',kickoff,hScore:null,aScore:null});
  sv();render();
}
function enterResult(mid){
  const h=document.getElementById('rh'+mid),a=document.getElementById('ra'+mid);
  if(!h||!a||h.value===''||a.value==='')return;
  const m=S.matches.find(x=>x.id===mid);if(!m)return;
  m.hScore=+h.value;m.aScore=+a.value;sv();
  notifWin(m);
  render();
}
function delMatch(mid){if(!confirm('Delete this fixture?'))return;S.matches=S.matches.filter(m=>m.id!==mid);sv();render();}
function scorePred(ph,pa,ah,aa){
  if(ph==null||pa==null)return{pts:0,type:'none'};
  if(+ph===+ah&&+pa===+aa)return{pts:4,type:'correct'};
  const pr=+ph>+pa?'H':+ph<+pa?'A':'D',ar=+ah>+aa?'H':+ah<+aa?'A':'D';
  if(pr===ar)return{pts:2,type:'result'};
  return{pts:0,type:'wrong'};
}
function getPredTotal(pid){
  let correct=0,result=0,wrong=0,total=0;
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    const pred=S.predictions[pid]?.[m.id];if(!pred)return;
    const{pts,type}=scorePred(pred.h,pred.a,m.hScore,m.aScore);
    total+=pts;if(type==='correct')correct++;else if(type==='result')result++;else if(type==='wrong')wrong++;
  });
  return{correct,result,wrong,total};
}

function notifWin(m){
  if(!S.players)return;
  S.players.forEach(p=>{
    p.teams.forEach(t=>{
      const won=(t.n===m.home&&m.hScore>m.aScore)||(t.n===m.away&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      const pts=won?(t.tier==='A'?S.rules.A.W:t.tier==='B'?S.rules.B.W:S.rules.C.W):(drew?(t.tier==='A'?S.rules.A.D:t.tier==='B'?S.rules.B.D:S.rules.C.D):0);
      if(won)fireNotif(`⚽ ${esc(t.n)} won! +${pts}pts`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)}'s team picks up points!`);
      else if(drew&&pts>0)fireNotif(`${esc(t.n)} drew`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)} gets ${pts}pts`);
    });
  });
}

async function syncMatches(){
  if(!sb)return;
  try{
    const{data}=await sb.from('matches').select('*').order('kickoff',{ascending:true});
    if(!data)return;
    S.matches=data.map(m=>({
      id:m.id,home:m.home,away:m.away,
      homeF:ALL_TEAMS.find(t=>t.n===m.home)?.f||'',
      awayF:ALL_TEAMS.find(t=>t.n===m.away)?.f||'',
      kickoff:m.kickoff,
      hScore:m.home_score??null,
      aScore:m.away_score??null
    }));
    recalcPoints();
    sv();render();
  }catch(e){console.warn('syncMatches failed',e);}
}

async function syncGoals(){
  if(!sb||!S.players)return;
  try{
    const{data}=await sb.from('goals').select('*');
    if(!data)return;
    S.players.forEach(p=>{
      p.scorerPts=0;
      data.forEach(g=>{
        const gn=g.player_name?.toLowerCase();
        if(p.picks.reg&&p.picks.reg.toLowerCase()===gn) p.scorerPts+=S.rules.sReg;
        if(p.picks.tierC&&p.picks.tierC.toLowerCase()===gn){
          const tm=p.teams.find(t=>t.n===g.team);
          if(tm?.tier==='C') p.scorerPts+=S.rules.sTierC;
        }
      });
    });
    sv();render();
  }catch(e){console.warn('syncGoals failed',e);}
}

function recalcPoints(){
  if(!S.players)return;
  S.players.forEach(p=>{
    p.matchPts=0;
    S.matches.forEach(m=>{
      if(m.hScore==null)return;
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
        const drew=m.hScore===m.aScore;
        const r=S.rules[t.tier]||S.rules.A;
        if(won)p.matchPts+=r.W;
        else if(drew)p.matchPts+=r.D;
        else p.matchPts+=r.L;
      });
    });
  });
  sv();render();
}

function subscribeRealtime(){
  if(!sb)return;
  try{
    sb.channel('matches-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>{
        syncMatches().then(()=>syncGoals());
      }).subscribe();
    sb.channel('goals-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'goals'},payload=>{
        const g=payload.new;
        if(S.players){
          const gn=(g.player_name||'').toLowerCase();
          S.players.forEach(p=>{
            if(p.picks.reg&&p.picks.reg.toLowerCase()===gn)
              fireNotif(`⚽ ${g.player_name} scored!`,`${esc(p.name)}'s top scorer +${S.rules.sReg}pts`);
            if(p.picks.tierC&&p.picks.tierC.toLowerCase()===gn)
              fireNotif(`🌟 ${g.player_name} scored!`,`${esc(p.name)}'s Tier C pick +${S.rules.sTierC}pts`);
          });
        }
        syncGoals();
      }).subscribe();
  }catch(e){console.warn('Realtime subscribe failed',e);}
}

function checkUpcomingPredReminders(){

    if(typeof Notification==='undefined'||Notification.permission!=='granted'||!S.players||!S.matches.length)return;
    const now=Date.now();

        const ko=new Date(m.kickoff).getTime();
        if(ko>now&&ko-now<=THREE_HRS){

          if(!pred)fireNotif(`⏰ Predict before kick-off!`,`${p.name}: ${m.home} vs ${m.away} kicks off soon — no prediction yet!`);

      });
    });
  }catch(e){}

function backBtn(to){
  return `<button onclick="S.onboardScreen='${to}';sv();render()" style="background:none;border:none;color:var(--th-muted);font-family:'Oswald',sans-serif;font-size:13px;cursor:pointer;letter-spacing:1px;margin-bottom:18px;padding:0;display:flex;align-items:center;gap:6px">← Back</button>`;

function validateLeaguePin(){
  const pin=(document.getElementById('lpin')?.value||'').trim().toUpperCase();
  if(!pin){alert('Please enter a league PIN.');return;}
  if(!S.leaguePin){alert('No league has been created yet. Ask your organiser.');return;}
  if(pin!==S.leaguePin.toUpperCase()){alert('League PIN not recognised. Check with your organiser.');return;}
  S.onboardScreen='register';sv();render();
}

async function selfRegister(){
  const name=(document.getElementById('reg-name')?.value||'').trim();
  const team=(document.getElementById('reg-team')?.value||'').trim();
  const pin=(document.getElementById('reg-pin')?.value||'').trim();
  if(!name||!team||!pin||pin.length<4){alert('Please fill in all fields and use a 4-digit PIN.');return;}
  if((S.registrations||[]).some(r=>r.name.toLowerCase()===name.toLowerCase())){
    alert(`${name} is already registered. If that's you, go back and log in with your PIN.`);return;
  }
  const reg={name,teamName:team,pin};
  S.registrations=[...(S.registrations||[]),reg];
  // Sync to Supabase so admin sees it live
  if(sb){
    try{
      await sb.from('settings').upsert({key:'registrations',value:JSON.stringify(S.registrations)});
    }catch(e){}
  }
  sv();
  S.onboardScreen='waiting';sv();render();
}

function removeReg(idx){
  S.registrations=(S.registrations||[]).filter((_,i)=>i!==idx);
  if(sb){sb.from('settings').upsert({key:'registrations',value:JSON.stringify(S.registrations)}).then(()=>{});}
  sv();render();
}

function createLeague(){
  const pin=(document.getElementById('new-league-pin')?.value||'').trim().toUpperCase();
  if(!pin||pin.length<3){alert('Please enter a league PIN of at least 3 characters.');return;}
  S.leaguePin=pin;
  // Store in Supabase so joiners can validate
  if(sb){sb.from('settings').upsert({key:'league_pin',value:pin}).then(()=>{});}
  sv();
  S.onboardScreen='waiting-admin';sv();render();
}

function soloLogin(){
  const pin=(document.getElementById('solo-pin-inp')?.value||'').trim();
  if(!pin)return;
  if(!S.players){alert('No league found yet. Ask your organiser for the league PIN.');return;}
  const idx=S.players.findIndex(p=>p.pin===pin);
  if(idx===-1){alert('PIN not recognised.');return;}
  S.loggedIn=idx;
  if(S.players[idx].theme)applyTheme(S.players[idx].theme);
  sv();render();
}

function adminGate(screen){
  const pin=(document.getElementById('admin-pin-inp')?.value||'').trim();
  if(!pin)return;
  if(pin!==S.adminPin){alert('Wrong admin PIN.');return;}
  if(screen==='admin-gate-create'){S.onboardScreen='create';}
  else if(screen==='admin-gate-draw'){S.onboardScreen='setup';}
  sv();render();
}

function getBreakdown(p){
  // W/D/L per tier from match results
  const bd={A:{W:0,D:0,L:0},B:{W:0,D:0,L:0},C:{W:0,D:0,L:0}};
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    p.teams.forEach(t=>{
      const isHome=t.n===m.home,isAway=t.n===m.away;
      if(!isHome&&!isAway)return;
      const tier=t.tier;
      const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      if(won)bd[tier].W++;else if(drew)bd[tier].D++;else bd[tier].L++;
    });
  });
  return bd;
}

function renderGroups(){
  const ownerView=S.groupOwnerView||false;
  const ownerMap={};
  if(S.players) S.players.forEach(p=>(p.teams||[]).forEach(t=>{ownerMap[t.n]=p;}));
  // Build standings from S.matches
  const standing={};
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    [m.home,m.away].forEach(n=>{if(!standing[n])standing[n]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    standing[m.home].p++;standing[m.away].p++;
    standing[m.home].gf+=m.hScore;standing[m.home].ga+=m.aScore;
    standing[m.away].gf+=m.aScore;standing[m.away].ga+=m.hScore;
    if(m.hScore>m.aScore){standing[m.home].w++;standing[m.home].pts+=3;standing[m.away].l++;}
    else if(m.hScore<m.aScore){standing[m.away].w++;standing[m.away].pts+=3;standing[m.home].l++;}
    else{standing[m.home].d++;standing[m.away].d++;standing[m.home].pts++;standing[m.away].pts++;}
  });
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);line-height:1.5">All 12 groups. Live from 11 June.</p>
    <div style="display:flex;gap:6px">
      <button class="pat-btn ${!ownerView?'on':''}" onclick="S.groupOwnerView=false;render()">Teams</button>
      <button class="pat-btn ${ownerView?'on':''}" onclick="S.groupOwnerView=true;render()">Owners</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    ${GROUPS.map(g=>`
    <div class="mcard">
      <div class="card-head" style="font-size:13px;padding:8px 12px">Group ${g.name}</div>
      <div style="padding:0 12px">
        ${g.teams.slice().sort((a,b)=>{
          const sa=standing[a.n]||{pts:0,gf:0,ga:0};
          const sb=standing[b.n]||{pts:0,gf:0,ga:0};
          return sb.pts-sa.pts||(sb.gf-sb.ga)-(sa.gf-sa.ga);
        }).map((t,i)=>{
          const owner=ownerMap[t.n];
          const st=standing[t.n]||{p:0,pts:0};
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;${i>0?'border-top:1px solid rgba(30,58,128,.3)':''}">
            <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1">
              <span style="font-size:16px;line-height:1;flex-shrink:0">${t.f}</span>
              <div style="min-width:0">
                <span style="font-family:'Oswald',sans-serif;font-size:12px;color:${t.n.startsWith('TBD')?'var(--th-secondary)':'var(--th-text)'};font-style:${t.n.startsWith('TBD')?'italic':''};display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.n)}</span>
                ${ownerView&&owner?`<span style="font-family:'Oswald',sans-serif;font-size:10px;color:#f5c518">${esc(owner.name)}</span>`:''}
              </div>
              ${ownerView&&owner?`<div style="flex-shrink:0;margin-left:4px">${logoSVG(owner.logo,18)}</div>`:''}
            </div>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">
              <span style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary)">P${st.p}</span>
              <span style="font-family:'Anton',Impact,sans-serif;font-size:13px;color:#f5c518">${st.pts}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

function savePred(pid,mid){
  const h=document.getElementById('ph_'+mid);
  const a=document.getElementById('pa_'+mid);
  if(!h||!a||h.value===''||a.value===''){alert('Enter both scores first.');return;}
  setPred(pid,mid,h.value,a.value);
  const btn=document.getElementById('savebtn_'+mid);
  if(btn){btn.textContent='Saved ✓';btn.style.background='linear-gradient(180deg,#4ade80,#16a34a)';setTimeout(()=>{if(btn){btn.textContent='Save';btn.style.background='';}},1800);}
}
function clearPred(pid,mid){
  if(!confirm('Remove your prediction for this match?'))return;
  if(S.predictions[pid])delete S.predictions[pid][mid];
  sv();
  if(sb&&S.players){
    const p=S.players[pid];
    if(p)sb.from('predictions').delete().eq('player_name',p.name).eq('match_id',mid).then(()=>{});
  }
  render();
}

function autoSavePred(pid,mid){
  const h=document.getElementById('ph_'+mid);
  const a=document.getElementById('pa_'+mid);
  if(!h||!a||h.value===''||a.value==='')return;
  setPred(pid,mid,h.value,a.value);
  const ind=document.getElementById('saved_'+mid);
  if(ind){ind.style.display='inline';setTimeout(()=>{if(ind)ind.style.display='none';},2000);}
}

function renderPredictions(){
  if(S.loggedIn===null)return renderLoginGate('Log in to submit your predictions.');
  const pid=S.loggedIn;
  // Upcoming = not locked (not started and no result)
  const upcoming=S.matches.filter(m=>!isLocked(m));
  // Played = has a result (show for scoring, then hide after a day)
  const played=S.matches.filter(m=>m.hScore!=null);
  if(!S.matches.length)return `<div class="mcard"><div class="card-head">🎯 Predictions</div><div class="card-body"><p style="font-family:'Oswald',sans-serif;font-size:14px;color:var(--th-muted);line-height:1.5">Fixtures loading from API...</p></div></div>`;
  const fmtKO=kickoff=>kickoff?new Date(kickoff).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'}):'TBC';
  const upHtml=upcoming.length?upcoming.map(m=>{
    const pred=S.predictions[pid]?.[m.id];
    return`<div class="match-card">
      <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase">${fmtKO(m.kickoff)}</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <span style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;flex:1;text-align:right">${m.homeF} ${esc(m.home)}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" min="0" max="20" class="score-inp" value="${pred?.h??''}" id="ph_${m.id}" placeholder="-" oninput="autoSavePred(${pid},'${m.id}')">
          <span style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:var(--th-secondary)">:</span>
          <input type="number" min="0" max="20" class="score-inp" value="${pred?.a??''}" id="pa_${m.id}" placeholder="-" oninput="autoSavePred(${pid},'${m.id}')">
        </div>
        <span style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;flex:1">${esc(m.away)} ${m.awayF}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:8px;align-items:center">
          <button id="savebtn_${m.id}" class="btn-sm" onclick="savePred(${pid},'${m.id}')">Save</button>
          ${pred!=null?`<button class="btn-sm btn-sm-red" style="font-size:11px" onclick="clearPred(${pid},'${m.id}')">Clear</button>`:''}
          <span id="saved_${m.id}" style="display:none;font-family:'Oswald',sans-serif;font-size:11px;color:#4ade80;letter-spacing:1px">✓ Saved</span>
        </div>
        ${pred!=null?`<span style="font-family:'Oswald',sans-serif;font-size:12px;color:#4ade80;letter-spacing:1px">✓ ${pred.h} - ${pred.a}</span>`:`<span style="font-family:'Oswald',sans-serif;font-size:12px;color:var(--th-secondary)">Not predicted yet</span>`}
      </div>
    </div>`;}).join(''):`<div style="padding:14px 16px"><p style="font-family:'Oswald',sans-serif;font-size:14px;color:var(--th-secondary)">No upcoming fixtures to predict.</p></div>`;
  const playedHtml=played.length?played.map(m=>{
    const pred=S.predictions[pid]?.[m.id];
    const{type}=pred?scorePred(pred.h,pred.a,m.hScore,m.aScore):{type:'none'};
    const ptClass=type==='correct'?'pred-correct':type==='result'?'pred-result':type==='wrong'?'pred-wrong':'pred-none';
    const ptLabel=type==='correct'?`✓ Correct score! +4pts`:type==='result'?`◆ Right result +2pts`:type==='wrong'?`✗ Wrong`:type==='none'?'No prediction':'';
    return`<div class="match-card"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;flex:1;text-align:right">${m.homeF} ${esc(m.home)}</span>
      <span style="font-family:'Anton',Impact,sans-serif;font-size:18px;letter-spacing:2px;color:var(--th-text)">${m.hScore} - ${m.aScore}</span>
      <span style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;flex:1">${esc(m.away)} ${m.awayF}</span>
    </div>
    <div style="margin-top:5px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary)">Your pick: ${pred?`${pred.h} - ${pred.a}`:'(none)'}</span>
      <span class="${ptClass}" style="font-size:11px">${ptLabel}</span>
    </div></div>`;}).join(''):'';
  return `
  <div class="mcard"><div class="card-head">🎯 Upcoming — Predict Now</div>${upHtml}</div>
  ${played.length?`<div class="mcard"><div class="card-head">📊 Results & Your Scores</div>${playedHtml}</div>`:''}`;
}

}

function renderPicks(){
  if(!S.players)return '';
  // Lock picks once any match has started or finished
  const locked=S.matches.some(m=>m.hScore!=null||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now()));
  return `<div style="display:flex;flex-direction:column;gap:10px">
    ${locked?`<div class="mcard"><div class="card-body" style="background:rgba(245,197,24,.07);border-radius:6px"><p style="font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518;letter-spacing:1px">🔒 Scorer picks are locked — the tournament has started.</p></div></div>`:''}
    ${S.players.map(p=>`<div class="mcard">
      <div class="card-head" style="cursor:pointer" onclick="showProfile(${p.id})">${logoSVG(p.logo,28)} ${esc(p.teamName)} <span style="font-size:11px;font-weight:400;color:var(--th-muted);margin-left:6px">${esc(p.name)}</span></div>
      <div class="card-body">
        <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:12px">${p.teams.map(t=>`<span class="badge ${TC[t.tier]}">${t.f} ${esc(t.n)}</span>`).join('')}</div>
        <div class="grid2">
          <div><label class="lbl">Top scorer <span class="badge ba">+${S.rules.sReg}pts/goal</span></label><input type="text" value="${esc(p.picks.reg)}" ${locked?'disabled':''} oninput="upPick(${p.id},'reg',this.value)" placeholder="e.g. Mbappé" style="${locked?'opacity:.5;cursor:not-allowed':''}"></div>
          <div><label class="lbl">Tier C scorer <span class="badge bc">+${S.rules.sTierC}pts/goal</span></label><input type="text" value="${esc(p.picks.tierC)}" ${locked?'disabled':''} oninput="upPick(${p.id},'tierC',this.value)" placeholder="Tier C striker" style="${locked?'opacity:.5;cursor:not-allowed':''}"></div>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderRules(){
  const r=S.rules;
  const admin=isAdmin();
  const ro=!admin;
  const roMsg=ro?`<div style="background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.25);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518">🔒 Rules can only be edited by the admin. Log in with the admin PIN to make changes.</div>`:'';
  const val=(v)=>ro?`<span style="font-family:'Anton',Impact,sans-serif;color:#f5c518;font-size:18px;padding:0 10px">${v}</span>`:null;
  const tr=(tier,lbl)=>`<div class="rrow"><span class="badge ${TC[tier]}" style="font-size:11px;padding:3px 9px;min-width:125px">${lbl}</span>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Win</label>${ro?val(r[tier].W):`<input type="number" class="pts" value="${r[tier].W}" onchange="upRule('${tier}.W',this.value)" min="0" max="20">`}</div>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Draw</label>${ro?val(r[tier].D):`<input type="number" class="pts" value="${r[tier].D}" onchange="upRule('${tier}.D',this.value)" min="0" max="20">`}</div>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Loss</label>${ro?val(r[tier].L):`<input type="number" class="pts" value="${r[tier].L}" onchange="upRule('${tier}.L',this.value)" min="0" max="20">`}</div>
  </div>`;
  const notifPerm=typeof Notification!=='undefined'?Notification.permission:'denied';
  const notifStatus=notifPerm==='granted'?'<span style="color:#4ade80">✓ Notifications active</span>':notifPerm==='denied'?'<span style="color:#f87171">✗ Blocked — enable in browser settings</span>':'<span style="color:var(--th-muted)">Not yet enabled</span>';
  const fixtureList=S.matches.length?S.matches.slice().sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff)).map(m=>{
    const ko=m.kickoff?new Date(m.kickoff).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'}):'TBC';
    const resultHtml=m.hScore!=null?`<span style="font-family:'Anton',Impact,sans-serif;font-size:13px;color:#f5c518">${m.hScore} - ${m.aScore}</span>`:
    admin?`<div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" max="20" class="pts" id="rh${m.id}" placeholder="H" style="width:44px"><span style="color:#5a7ab4">-</span><input type="number" min="0" max="20" class="pts" id="ra${m.id}" placeholder="A" style="width:44px"><button class="btn-sm" onclick="enterResult('${m.id}')">Enter</button></div>`:`<span style="font-family:'Oswald',sans-serif;font-size:12px;color:var(--th-secondary)">Upcoming</span>`;
    return`<div style="padding:10px 0;border-bottom:1px solid rgba(30,58,128,.3);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--th-text)">${m.homeF} ${esc(m.home)} vs ${esc(m.away)} ${m.awayF}</div><div style="font-size:11px;color:var(--th-secondary);letter-spacing:1px;font-family:'Oswald',sans-serif;margin-top:2px">${ko}</div></div><div>${resultHtml}</div></div>`;
  }).join(''):`<p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary);padding:12px 0">Fixtures loading from API...</p>`;
  return `
  ${roMsg}
  <div class="mcard"><div class="card-head">⚽ Match Points by Tier</div><div style="padding:0 16px">${tr('A','★★★ Tier A — Elite')}${tr('B','★★ Tier B — Mid')}${tr('C','★ Tier C — Underdog')}</div></div>
  <div class="mcard"><div class="card-head">⚽ Scorer Picks</div><div class="card-body" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
    <div class="rpts"><span class="badge ba" style="font-size:11px">Regular</span>${ro?val(r.sReg):`<input type="number" class="pts" value="${r.sReg}" onchange="upRule('sReg',this.value)" min="0" max="30">`}<span>pts/goal</span></div>
    <div class="rpts"><span class="badge bc" style="font-size:11px">Tier C</span>${ro?val(r.sTierC):`<input type="number" class="pts" value="${r.sTierC}" onchange="upRule('sTierC',this.value)" min="0" max="30">`}<span>pts/goal</span></div>
  </div></div>
  <div class="mcard"><div class="card-head">🏆 Tournament Winner Bonus</div><div class="card-body" style="display:flex;align-items:center;gap:12px">${ro?val(r.winner):`<input type="number" class="pts" value="${r.winner}" onchange="upRule('winner',this.value)" min="0" max="100">`}<span style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted)">bonus pts if your team wins the tournament</span></div></div>
  ${admin?`<button id="srb" class="btn-gold" onclick="saveRules()" style="margin-bottom:20px">Save Rules</button>`:''}
  <div class="mcard"><div class="card-head">🔔 Notifications</div><div class="card-body">
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);margin-bottom:10px;line-height:1.5">Enable to get alerts 3 hours before kick-off if you haven't predicted, and when scorers find the net.</p>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div style="font-family:'Oswald',sans-serif;font-size:13px">${notifStatus}</div>${notifPerm!=='granted'?`<button class="btn-sm" onclick="reqNotif()">Enable Notifications</button>`:''}</div>
  </div></div>
  <div class="mcard"><div class="card-head">🗓️ Fixtures <span style="font-size:11px;color:var(--th-secondary);font-weight:400;font-family:'Oswald',sans-serif;letter-spacing:0">${S.matches.length} loaded via API</span></div>
    <div style="padding:0 16px;max-height:400px;overflow-y:auto">${fixtureList}</div>
  </div>`;
}

// ===== CHAT =====
let chatMessages=[];
let chatSub=null;
let S_chatConvo='group';

// Use S for persistent unread counts
function getChatUnread(){try{return JSON.parse(localStorage.getItem('wc26x_unread'))||{};}catch(e){return{};}}
function addUnread(key){const u=getChatUnread();u[key]=(u[key]||0)+1;try{localStorage.setItem('wc26x_unread',JSON.stringify(u));}catch(e){}}
function clearUnread(key){const u=getChatUnread();u[key]=0;try{localStorage.setItem('wc26x_unread',JSON.stringify(u));}catch(e){}}
function clearAllUnread(){try{localStorage.setItem('wc26x_unread','{}');}catch(e){}}
function totalUnread(){return Object.values(getChatUnread()).reduce((a,b)=>a+b,0);}

async function initChat(){
  if(!sb)return;
  try{
    const{data}=await sb.from('messages').select('*').order('created_at',{ascending:true}).limit(200);
    if(data)chatMessages=data;
    // If chat tab is already open, render the messages now they've loaded
    if(S.tab==='chat') renderChatPanel();
    if(!chatSub){
      chatSub=sb.channel('chat-live')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
          chatMessages.push(payload.new);
          const m=payload.new;
          const myName=S.players?.[S.loggedIn]?.name;
          const ismine=m.player_name===myName;
          if(!ismine){
            const key=m.to_player?`dm_${m.player_name}`:'group';
            if(S.tab!=='chat'||S_chatConvo!==key.replace('dm_','')){
              addUnread(key);
              const btn=document.getElementById('chat-tab-btn');
              if(btn){btn.innerHTML='Chat <span style="color:#f87171;font-size:14px">●</span>';btn.style.color='#f87171';}
            }
            fireNotif(
              m.to_player?`💬 DM from ${m.player_name}`:`💬 ${m.player_name} in Group Chat`,
              m.message.length>80?m.message.substring(0,80)+'...':m.message
            );
            if(S.tab==='chat'){
              const idKey=m.to_player?`dm_${m.player_name}`:'group';
              const badge=document.getElementById(`unread_${idKey}`);
              if(badge){const u=getChatUnread()[idKey]||0;badge.style.display=u>0?'flex':'none';badge.textContent=u;}
              const preview=document.getElementById(`preview_${idKey}`);
              if(preview){preview.textContent=m.message.substring(0,30)+(m.message.length>30?'..':'');preview.style.color='#f87171';}
            }
          }
          if(S.tab==='chat') renderChatPanel();
        }).subscribe();
    }
  }catch(e){console.warn('Chat init failed',e);}
}

function getConvoMessages(convo,myName){
  if(convo==='group') return chatMessages.filter(m=>!m.to_player);
  return chatMessages.filter(m=>
    (m.player_name===myName&&m.to_player===convo)||
    (m.player_name===convo&&m.to_player===myName)
  );
}

function renderChatPanel(){
  const box=document.getElementById('chat-messages');
  if(!box)return;
  const myName=S.players?.[S.loggedIn]?.name||'';
  const msgs=getConvoMessages(S_chatConvo,myName);
  box.innerHTML=msgs.length?msgs.map(m=>{
    const isBot=m.player_name==='Match Bot 🤖';
    const mine=!isBot&&m.player_name===myName;
    const t=new Date(m.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
    if(isBot) return`<div style="text-align:center;margin:8px 0">
      <div style="display:inline-block;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.2);border-radius:8px;padding:8px 14px;font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518;line-height:1.5;max-width:90%;text-align:left;white-space:pre-line">${esc(m.message).replace(/\[ref:\d+\]/g,'')}</div>
      <div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary);margin-top:2px">${t}</div>
    </div>`;
    return`<div style="display:flex;flex-direction:column;${mine?'align-items:flex-end':'align-items:flex-start'};margin-bottom:10px">
      <div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary);margin-bottom:3px">${mine?'You':esc(m.player_name)} · ${t}</div>
      <div style="max-width:80%;padding:9px 13px;border-radius:${mine?'14px 14px 2px 14px':'14px 14px 14px 2px'};background:${mine?'#f5c518':'rgba(30,58,128,.7)'};color:${mine?'#07122a':'var(--th-text)'};font-family:'Oswald',sans-serif;font-size:14px;line-height:1.45;word-break:break-word">${esc(m.message)}</div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:30px 0;font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary)">No messages yet. Say hello!</div>`;
  box.scrollTop=box.scrollHeight;
}

async function sendChat(){
  if(!sb||S.loggedIn===null)return;
  const inp=document.getElementById('chat-inp');
  if(!inp||!inp.value.trim())return;
  const p=S.players[S.loggedIn];
  const msg=inp.value.trim();inp.value='';
  const payload={player_name:p.name,message:msg,to_player:S_chatConvo==='group'?null:S_chatConvo};
  try{await sb.from('messages').insert(payload);}catch(e){console.warn('send failed',e);}
}

function selectConvo(convo){
  S_chatConvo=convo;
  const key=convo==='group'?'group':`dm_${convo}`;
  if(chatUnread[key]){unreadTotal-=chatUnread[key];chatUnread[key]=0;}
  renderChat(S.players?.[S.loggedIn]);
  // Re-render the chat content inline
  const chatArea=document.getElementById('chat-area');
  if(chatArea) chatArea.innerHTML=buildChatArea();
  setTimeout(()=>{renderChatPanel();},0);
}

function buildChatArea(){
  const loggedIn=S.loggedIn!=null;
  const myName=S.players?.[S.loggedIn]?.name||'';
  return`<div style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div style="padding:10px 14px;border-bottom:1px solid var(--th-border);font-family:'Anton',Impact,sans-serif;font-size:13px;letter-spacing:1px;color:#f5c518;flex-shrink:0">
      ${S_chatConvo==='group'?'💬 Group Chat':`💬 ${esc(S_chatConvo)}`}
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:14px"></div>
    ${loggedIn?`<div style="padding:10px;border-top:1px solid var(--th-border);display:flex;gap:8px;flex-shrink:0">
      <input id="chat-inp" type="text" placeholder="Message..." style="flex:1;font-size:14px;padding:9px 12px" oninput="clearUnread(S_chatConvo==='group'?'group':'dm_'+S_chatConvo)" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn-sm" onclick="sendChat()" style="font-size:13px">Send</button>
    </div>`:`<div style="padding:14px;text-align:center;font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary)">Log in to send messages</div>`}
  </div>`;
}

function renderChat(p){
  const myName=p?.name||'';
  const others=(S.players||[]).filter(pl=>pl.name!==myName);
  const convos=[
    {key:'group',label:'Group Chat',sub:'Everyone',icon:'💬'},
    ...others.map(pl=>({key:pl.name,label:esc(pl.name),sub:esc(pl.teamName),icon:'',logo:pl.logo}))
  ];
  const sidebar=convos.map(c=>{
    const unreads=(getChatUnread()[c.key==='group'?'group':`dm_${c.key}`])||0;
    const idKey=c.key==='group'?'group':`dm_${c.key}`;
    const active=S_chatConvo===c.key;
    const convMsgs=getConvoMessages(c.key,myName);
    const lastMsg=convMsgs[convMsgs.length-1];
    const preview=lastMsg?lastMsg.message.replace(/\[ref:\d+\]/g,'').substring(0,32)+(lastMsg.message.length>32?'..':''):'';
    return`<div onclick="S_chatConvo='${c.key}';clearUnread('${idKey}');document.getElementById('chat-area').innerHTML=buildChatArea();setTimeout(renderChatPanel,0);document.querySelectorAll('.convo-btn').forEach(b=>{b.classList.remove('on');b.style.background='transparent';});this.classList.add('on');this.style.background='rgba(245,197,24,.08)';" class="convo-btn ${active?'on':''}" style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--th-border-soft);background:${active?'rgba(245,197,24,.08)':unreads>0?'rgba(248,113,113,.08)':'transparent'};transition:background .15s">
      ${c.logo?`<div style="flex-shrink:0">${logoSVG(c.logo,28)}</div>`:`<span style="font-size:20px;flex-shrink:0">${c.icon}</span>`}
      <div style="flex:1;min-width:0">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:12px;letter-spacing:.5px;color:${unreads>0&&!active?'#f87171':active?'#f5c518':'var(--th-text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.label}</div>
        <div id="preview_${idKey}" style="font-family:'Oswald',sans-serif;font-size:10px;color:${unreads>0&&!active?'#f87171':'var(--th-secondary)'};font-weight:${unreads>0&&!active?'600':'400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">${preview||c.sub}</div>
      </div>
      <span id="unread_${idKey}" style="display:${unreads>0?'flex':'none'};background:#f87171;color:#fff;border-radius:10px;min-width:20px;height:20px;padding:0 5px;align-items:center;justify-content:center;font-family:'Anton',Impact,sans-serif;font-size:11px;flex-shrink:0">${unreads||''}</span>
    </div>`;
  }).join('');

  const html=`<div style="display:flex;height:500px;border-radius:8px;overflow:hidden;border:2px solid var(--th-border)">
    <div style="width:160px;flex-shrink:0;border-right:1px solid var(--th-border);overflow-y:auto;background:var(--th-sb)">${sidebar}</div>
    <div id="chat-area" style="flex:1;display:flex;flex-direction:column;min-width:0;background:var(--th-sa)">${buildChatArea()}</div>
  </div>`;
  setTimeout(renderChatPanel,0);
  return html;
}

init();
</script>
</body>
</html>
