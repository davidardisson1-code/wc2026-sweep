@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>

d','Vatreni — the Blazers — punching miles above their weight since 1998'],'Uruguay':['Winners of the very first World Cup, on home soil in 1930','Suárez\'s bite, Ghiggia\'s goal, Cavani\'s bicycle kick — always dramatic','La Celeste — two stars, the founders, South America\'s oldest football nation'],'Morocco':['The first African and Arab nation to reach a World Cup semi-final','They knocked out Spain, Portugal and Belgium in the same tournament','The Atlas Lions of Qatar 2022 — the greatest underdog run in World Cup history'],'Switzerland':['Hosted and reached the semis in 1954, often forgotten in their own story','Quietly consistent — they\'ve reached the knockouts four times since 2006','The Nati — solid, disciplined, never flashy, almost never go home early'],'Norway':['Knocked Brazil out in 1998 with a famous Tore André Flo winner','The nation that produced Haaland and once beat the five-time champions','Viking blood, underdog spirit — and a striker the whole world is watching'],'Colombia':['Their 1994 campaign ended in tragedy — Escobar\'s own goal cost him everything','James Rodríguez won the golden boot in 2014 with one of the great tournament runs','Los Cafeteros — coffee, cumbia, and a quarter-final no one who watched will forget'],'Austria':['The Wunderteam of the 1930s were among the finest sides in the world','Reached the semi-finals in 1954 in the highest-scoring World Cup ever','Red and white, Alpine pride — hoping this generation can match the legends'],'Mexico':['Reached the last 16 seven consecutive times — the curse of the fifth game','El Tri hosted two World Cups and went out at the same stage every single time','The Azteca roar, Chicharito\'s goals — a nation completely consumed by football'],'Japan':['Co-hosts in 2002 who quietly became Asia\'s most consistent side','Shocked Germany and Spain in Qatar 2022 — no one saw it coming','The Samurai Blue have made every World Cup since 1998 without fail'],'South Korea':['Co-hosts in 2002 who reached const dl=ms=>new Promise(r=>setTimeout(r,ms));
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function autoInit(name){const w=(name||'').trim().split(/\s+/).filter(Boolean);return w.length>1?w.slice(0,2).map(x=>x[0]).join('').toUpperCase():(name||'??').substring(0,2).toUpperCase();}

function init(){

      const d=JSON.parse(raw);
      const players=d.players?d.players.map(p=>({
        ...p,kit:p.kit||{...DK},
        logo:{...DL,...(p.logo||{}),initials:p.logo?.initials||autoInit(p.teamName||p.name),initialsPos:p.logo?.initialsPos||'bottom',stars:p.logo?.stars||0,textColor:p.logo?.textColor||p.logo?.accent||'#ffd700'},

        teamName:p.teamName||`Team ${p.id+1}`,pin:p.pin||''
      })):null;
      Object.assign(S,{phase:d.phase||'setup',names:d.names||S.names,teamNames:d.teamNames||S.teamNames,
        pins:d.pins||S.pins,adminPin:d.adminPin||'',sh:d.sh||null,dr:d.dr||0,dp:d.dp||0,players,
        rules:{...S.rules,...(d.rules||{})},loggedIn:d.loggedIn??null,

// ===== PREDICTIONS =====
function hasPendingPreds(pid){
  if(pid===null||!S.matches.length)return false;
  const now=Date.now();
  return S.matches.some(m=>{
    const upcoming=!m.kickoff||new Date(m.kickoff).getTime()>now;
    const noResult=m.hScore==null;
    const noPred=!S.predictions[pid]?.[m.id];
    return upcoming&&noResult&&noPred;
  });
}
function isLocked(m){return m.hScore!=null||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now());}
function setPred(pid,mid,h,a){
  if(!S.predictions[pid])S.predictions[pid]={};
  S.predictions[pid][mid]={h:+h,a:+a};sv();
  savePredToSB(pid,mid,+h,+a);
}
function addMatch(){
  const hEl=document.getElementById('mh'),aEl=document.getElementById('ma'),dEl=document.getElementById('md'),tEl=document.getElementById('mt');
  if(!hEl||!aEl)return;
  const home=hEl.value,away=aEl.value;
  if(!home||!away||home===away){alert('Pick two different teams.');return;}
  const kickoff=dEl?.value&&tEl?.value?`${dEl.value}T${tEl.value}`:null;
  S.matches.push({id:'m'+Date.now(),home,away,homeF:ALL_TEAMS.find(t=>t.n===home)?.f||'',awayF:ALL_TEAMS.find(t=>t.n===away)?.f||'',kickoff,hScore:null,aScore:null});
  sv();render();
}
function enterResult(mid){
  const h=document.getElementById('rh'+mid),a=document.getElementById('ra'+mid);
  if(!h||!a||h.value===''||a.value==='')return;
  const m=S.matches.find(x=>x.id===mid);if(!m)return;
  m.hScore=+h.value;m.aScore=+a.value;sv();
  notifWin(m);
  render();
}
function delMatch(mid){if(!confirm('Delete this fixture?'))return;S.matches=S.matches.filter(m=>m.id!==mid);sv();render();}
function scorePred(ph,pa,ah,aa){
  if(ph==null||pa==null)return{pts:0,type:'none'};
  if(+ph===+ah&&+pa===+aa)return{pts:4,type:'correct'};
  const pr=+ph>+pa?'H':+ph<+pa?'A':'D',ar=+ah>+aa?'H':+ah<+aa?'A':'D';
  if(pr===ar)return{pts:2,type:'result'};
  return{pts:0,type:'wrong'};
}
function getPredTotal(pid){
  let correct=0,result=0,wrong=0,total=0;
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    const pred=S.predictions[pid]?.[m.id];if(!pred)return;
    const{pts,type}=scorePred(pred.h,pred.a,m.hScore,m.aScore);
    total+=pts;if(type==='correct')correct++;else if(type==='result')result++;else if(type==='wrong')wrong++;
  });
  return{correct,result,wrong,total};
}

function notifWin(m){
  if(!S.players)return;
  S.players.forEach(p=>{
    p.teams.forEach(t=>{
      const won=(t.n===m.home&&m.hScore>m.aScore)||(t.n===m.away&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      const pts=won?(t.tier==='A'?S.rules.A.W:t.tier==='B'?S.rules.B.W:S.rules.C.W):(drew?(t.tier==='A'?S.rules.A.D:t.tier==='B'?S.rules.B.D:S.rules.C.D):0);
      if(won)fireNotif(`⚽ ${esc(t.n)} won! +${pts}pts`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)}'s team picks up points!`);
      else if(drew&&pts>0)fireNotif(`${esc(t.n)} drew`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)} gets ${pts}pts`);
    });
  });
}
function logGoal(){
  const sc=document.getElementById('gs'),tm=document.getElementById('gt');
  if(!sc?.value.trim())return;
  const scorer=sc.value.trim();
  if(S.players){
    S.players.forEach(p=>{
      if(p.picks.reg&&p.picks.reg.toLowerCase()===scorer.toLowerCase())
        fireNotif(`⚽ ${esc(scorer)} scored!`,`${esc(p.name)}'s top scorer found the net! +${S.rules.sReg}pts`);
      if(p.picks.tierC&&p.picks.tierC.toLowerCase()===scorer.toLowerCase())
        fireNotif(`🌟 ${esc(scorer)} scored!`,`${esc(p.name)}'s Tier C pick scored! +${S.rules.sTierC}pts`);
    });
  }
  sc.value='';
}

        if(p.picks.reg&&p.picks.reg.toLowerCase()===gn) p.scorerPts+=S.rules.sReg;
        if(p.picks.tierC&&p.picks.tierC.toLowerCase()===gn){
          const tm=p.teams.find(t=>t.n===g.team);
          if(tm?.tier==='C') p.scorerPts+=S.rules.sTierC;
        }
      });
    });
    sv();render();
  }catch(e){console.warn('syncGoals failed',e);}
}

function recalcPoints(){
  if(!S.players)return;
  S.players.forEach(p=>{
    p.matchPts=0;
    S.matches.forEach(m=>{
      if(m.hScore==null)return;
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
        const drew=m.hScore===m.aScore;
        const r=S.rules[t.tier]||S.rules.A;
        if(won)p.matchPts+=r.W;
        else if(drew)p.matchPts+=r.D;
        else p.matchPts+=r.L;
      });
    });
  });
  sv();render();
}

function subscribeRealtime(){
  if(!sb)return;
  try{
    sb.channel('matches-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>{
        syncMatches().then(()=>syncGoals());
      }).subscribe();
    sb.channel('goals-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'goals'},payload=>{
        const g=payload.new;
        if(S.players){
          const gn=(g.player_name||'').toLowerCase();
          S.players.forEach(p=>{
            if(p.picks.reg&&p.picks.reg.toLowerCase()===gn)
              fireNotif(`⚽ ${g.player_name} scored!`,`${esc(p.name)}'s top scorer +${S.rules.sReg}pts`);
            if(p.picks.tierC&&p.picks.tierC.toLowerCase()===gn)
              fireNotif(`🌟 ${g.player_name} scored!`,`${esc(p.name)}'s Tier C pick +${S.rules.sTierC}pts`);
          });
        }
        syncGoals();
      }).subscribe();
  }catch(e){console.warn('Realtime subscribe failed',e);}
}

async function loadPlayersFromSB(){
  if(!sb)return;
  try{
    const{data}=await sb.from('players').select('*');
    if(!data||!data.length)return;
    // Merge Supabase player data into local state
    if(!S.players)return;
    S.players=S.players.map(p=>{
      const sbp=data.find(x=>x.id===p.id);
      if(!sbp)return p;
      return{
        ...p,
        teamName:sbp.team_name||p.teamName,
        kit:sbp.kit||p.kit,
        logo:{...DL,...(sbp.logo||p.logo||{}),textColor:(sbp.logo||p.logo)?.textColor||'#ffd700'},

        matchPts:sbp.match_pts||p.matchPts||0,
        scorerPts:sbp.scorer_pts||p.scorerPts||0,
      };
    });
    sv();render();
  }catch(e){console.warn('loadPlayersFromSB failed',e);}
}

async function loadPredictionsFromSB(){
  if(!sb)return;
  try{
    const{data}=await sb.from('predictions').select('*');
    if(!data)return;
    S.predictions={};
    data.forEach(r=>{
      const pid=S.players?.findIndex(p=>p.name===r.player_name);
      if(pid===-1||pid==null)return;
      if(!S.predictions[pid])S.predictions[pid]={};
      S.predictions[pid][r.match_id]={h:r.pred_home,a:r.pred_away};
    });
    sv();
  }catch(e){console.warn('loadPredictionsFromSB failed',e);}
}

async function pushPlayersToSB(){

function getBreakdown(p){
  // W/D/L per tier from match results
  const bd={A:{W:0,D:0,L:0},B:{W:0,D:0,L:0},C:{W:0,D:0,L:0}};
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    p.teams.forEach(t=>{
      const isHome=t.n===m.home,isAway=t.n===m.away;
      if(!isHome&&!isAway)return;
      const tier=t.tier;
      const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      if(won)bd[tier].W++;else if(drew)bd[tier].D++;else bd[tier].L++;
    });
  });
  return bd;
}

        <div style="margin-bottom:10px"><label class="lbl">Shape</label><div style="display:flex;gap:5px;flex-wrap:wrap">${SHAPES.map(s=>`<button class="shape-btn ${l.shape===s?'on':''}" onclick="upLogo('shape','${s}');render()">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}</div></div>
        <div class="crow"><label>Background</label><input type="color" value="${l.bg}" oninput="upLogo('bg',this.value)" onchange="upLogo('bg',this.value)"></div>
        <div class="crow"><label>Border / Accent</label><input type="color" value="${l.accent}" oninput="upLogo('accent',this.value)" onchange="upLogo('accent',this.value)"></div>
        <div class="crow"><label>Text Colour</label><input type="color" value="${l.textColor||l.accent}" oninput="upLogo('textColor',this.value)" onchange="upLogo('textColor',this.value)"></div>
        <div style="margin-bottom:10px"><label class="lbl">Initials</label><input type="text" id="logo-init-inp" maxlength="4" value="${esc(l.initials)}" oninput="upInitials(this.value)" style="width:80px;letter-spacing:4px;text-align:center;font-family:'Anton',Impact,sans-serif;font-size:18px"></div>
        <div style="margin-bottom:10px"><label class="lbl">Initials Position</label><div style="display:flex;gap:5px;flex-wrap:wrap">${[{v:'bottom',lbl:'Bottom'},{v:'top',lbl:'Top'},{v:'split-v',lbl:'Top+Bottom'},{v:'split-h',lbl:'Left+Right'}].map(opt=>`<button class="pat-btn ${(l.initialsPos||'bottom')===opt.v?'on':''}" onclick="upInitialsPos('${opt.v}')">${opt.lbl}</button>`).join('')}</div></div>
        <div style="margin-bottom:10px"><label class="lbl">World Cup Stars ★</label><div style="display:flex;gap:5px;flex-wrap:wrap">${[0,1,2,3,4,5].map(n=>`<button class="pat-btn ${(l.stars||0)===n?'on':''}" onclick="upStars(${n})" style="min-width:36px">${n===0?'None':'★'.repeat(n)}</button>`).join('')}</div></div>
      </div>
    </div>
    <label class="lbl">Symbol</label>
    <div style="display:flex;flex-wrap:wrap;gap:4px">${SYMBOLS.map(s=>`<button class="sym-btn ${l.symbol===s?'on':''}" onclick="upLogo('symbol','${s}');render()">${s}</button>`).join('')}</div>
  </div></div>
  <div class="mcard"><div class="card-head">👕 Kit Designer</div><div class="card-body">
    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px">
      <div class="kit-wrap" style="min-width:130px"><div id="kit-prev">${kitSVG(k,110,140,p.logo)}</div></div>
      <div style="flex:1;min-width:180px">
        <div style="margin-bottom:10px"><label class="lbl">Shirt Pattern</label><div style="display:flex;gap:5px;flex-wrap:wrap">${['plain','stripes','hoops','pinstripe','sash','halves','quarters','diagonal','chevron','collar','sleeves','thirds','panel'].map(pt=>`<button class="pat-btn ${k.shirtPattern===pt?'on':''}" onclick="upKit('shirtPattern','${pt}');render()">${pt.charAt(0).toUpperCase()+pt.slice(1)}</button>`).join('')}</div></div>
        <div class="crow"><label>Shirt Col. 1</label><input type="color" value="${k.shirtC1}" oninput="upKit('shirtC1',this.value)" onchange="upKit('shirtC1',this.value)"></div>
        <div class="crow"><label>Shirt Col. 2</label><input type="color" value="${k.shirtC2}" oninput="upKit('shirtC2',this.value)" onchange="upKit('shirtC2',this.value)"></div>
        <div class="crow"><label>Shorts</label><input type="color" value="${k.shortsColor}" oninput="upKit('shortsColor',this.value)" onchange="upKit('shortsColor',this.value)"></div>
        <div class="crow"><label>Socks</label><input type="color" value="${k.socksColor}" oninput="upKit('socksColor',this.value)" onchange="upKit('socksColor',this.value)"></div>
      </div>
    </div>
  </div></div>
  <div class="mcard"><div class="card-head">👟 Boots</div><div class="card-body">
    <div class="grid2" style="gap:7px;margin-bottom:16px">${BOOTS.map(b=>`<button class="boot-btn ${p.boots===b.id?'on':''}" onclick="upBoots('${b.id}')" style="background:${b.bg};color:${b.accent};border-color:${b.bg}"><div style="font-family:'Anton',Impact,sans-serif;font-size:13px;letter-spacing:1px">${b.label}</div><div style="font-size:11px;opacity:.8;font-family:'Oswald',sans-serif;margin-top:2px">${b.sub}</div></button>`).join('')}</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-top:14px;border-top:1px solid rgba(30,58,128,.4)">
      <div id="boot-prev">${bootSVG(p.bootC1||BOOTS.find(x=>x.id===p.boots)?.bg||'#b00', p.bootC2||BOOTS.find(x=>x.id===p.boots)?.accent||'#fff', 52)}</div>
      <div style="flex:1">
        <div class="crow"><label>Boot colour 1</label><input type="color" value="${p.bootC1||BOOTS.find(x=>x.id===p.boots)?.bg||'#b00'}" oninput="upBootColor('bootC1',this.value)" onchange="upBootColor('bootC1',this.value)"></div>
        <div class="crow"><label>Boot colour 2</label><input type="color" value="${p.bootC2||BOOTS.find(x=>x.id===p.boots)?.accent||'#fff'}" oninput="upBootColor('bootC2',this.value)" onchange="upBootColor('bootC2',this.value)"></div>
      </div>
    </div>
  </div></div>
  <div class="mcard"><div class="card-head">🎨 Site Theme</div><div class="card-body">
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);margin-bottom:12px;line-height:1.5">Your personal colour theme — only active while you're logged in.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${THEMES.map(t=>`<button onclick="upTheme('${t.id}')" style="padding:10px 12px;border-radius:6px;border:2px solid ${(p.theme||'navy')===t.id?'#f5c518':'rgba(128,128,128,.25)'};background:${t.bg};cursor:pointer;text-align:left;transition:border-color .15s"><div style="font-family:'Anton',Impact,sans-serif;font-size:11px;color:${t.text};letter-spacing:1px;margin-bottom:6px">${t.label}</div><div style="display:flex;gap:4px">${[t.bg,t.sa,t.text,t.muted,t.secondary].map(c=>`<span style="width:13px;height:13px;border-radius:50%;background:${c};display:inline-block;border:1px solid rgba(128,128,128,.3)"></span>`).join('')}</div></button>`).join('')}
    </div>
  </div></div>`;
}

function renderPredictions(){
  if(S.loggedIn===null)return renderLoginGate('Log in to submit your predictions.');
  const pid=S.loggedIn;
  const now=Date.now();
  const upcoming=S.matches.filter(m=>!isLocked(m));
  const past=S.matches.filter(m=>isLocked(m));
  if(!S.matches.length)return `<div class="mcard"><div class="card-head">🎯 Predictions</div><div class="card-body"><p style="font-family:'Oswald',sans-serif;font-size:14px;color:#94afd4;line-height:1.5">No fixtures added yet. The organiser can add them in the Rules tab.</p></div></div>`;
  const upHtml=upcoming.length?upcoming.map(m=>{
    const pred=S.predictions[pid]?.[m.id];
    const ko=m.kickoff?new Date(m.kickoff).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'TBC';
    return`<div class="match-card"><div style="font-family:'Oswald',sans-serif;font-size:11px;color:#5a7ab4;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase">${ko}</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;flex:1;text-align:right">${m.homeF} ${esc(m.home)}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" min="0" max="20" class="score-inp" value="${pred?.h??''}" onchange="setPred(${pid},'${m.id}',this.value,document.getElementById('pa_${m.id}').value)" id="ph_${m.id}" placeholder="-">
        <span style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#5a7ab4">:</span>
        <input type="number" min="0" max="20" class="score-inp" value="${pred?.a??''}" onchange="setPred(${pid},'${m.id}',document.getElementById('ph_${m.id}').value,this.value)" id="pa_${m.id}" placeholder="-">
      </div>
      <span style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;flex:1">${esc(m.away)} ${m.awayF}</span>
    </div>
    ${pred!=null?`<div style="font-family:'Oswald',sans-serif;font-size:12px;color:#4ade80;margin-top:6px;letter-spacing:1px">✓ Prediction saved: ${pred.h} - ${pred.a}</div>`:''}
    </div>`;}).join(''):`<p style="font-family:'Oswald',sans-serif;font-size:14px;color:#5a7ab4;padding:14px 0">No upcoming fixtures right now.</p>`;
  const pastHtml=past.length?past.map(m=>{
    const pred=S.predictions[pid]?.[m.id];
    const{pts,type}=pred?scorePred(pred.h,pred.a,m.hScore,m.aScore):{pts:0,type:'none'};
    const ptClass=type==='correct'?'pred-correct':type==='result'?'pred-result':type==='wrong'?'pred-wrong':'pred-none';
    const ptLabel=type==='correct'?`✓ Correct score! +5pts`:type==='result'?`◆ Right result +2pts`:type==='wrong'?`✗ Wrong — 0pts`:'No prediction';
    return`<div class="match-card"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;flex:1;text-align:right">${m.homeF} ${esc(m.home)}</span>
      <span style="font-family:'Anton',Impact,sans-serif;font-size:20px;letter-spacing:2px">${m.hScore} - ${m.aScore}</span>
      <span style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;flex:1">${esc(m.away)} ${m.awayF}</span>
    </div>
    <div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#5a7ab4">Your pick: ${pred?`${pred.h} - ${pred.a}`:'(none)'}</span>
      <span class="${ptClass}">${ptLabel}</span>
    </div></div>`;}).join(''):'';
  return `
  <div class="mcard"><div class="card-head">🎯 Upcoming — Predict Now</div>${upHtml}</div>
  ${past.length?`<div class="mcard"><div class="card-head">📊 Results & Your Scores</div>${pastHtml}</div>`:''}`;
}

function renderPredTable(){
  if(!S.players)return '';
  const totals=S.players.map(p=>({...p,...getPredTotal(p.id)})).sort((a,b)=>b.total-a.total);
  return `<div class="mcard">${totals.map((p,i)=>`
    <div style="display:flex;gap:10px;padding:11px 14px;${i>0?'border-top:1px solid var(--th-border-soft)':''}align-items:center">
      <div style="flex-shrink:0;text-align:center;min-width:22px">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:14px;color:#f5c518">${i+1}</div>
      </div>
      <div style="flex-shrink:0">${logoSVG(p.logo,36)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:14px;letter-spacing:1px;color:#f5c518;line-height:1">${esc(p.teamName)}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary)">${esc(p.name)}</div>
      </div>
      <div style="flex-shrink:0;display:flex;gap:14px;align-items:center">
        <div style="text-align:center">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#4ade80">${p.correct}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">SCORE</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#f5c518">${p.result}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">RESULT</div>
        </div>
        <div style="text-align:center;min-width:32px">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:26px;color:#f5c518;line-height:1">${p.total}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">PTS</div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function renderPicks(){
  if(!S.players)return '';
  return `<div style="display:flex;flex-direction:column;gap:10px">${S.players.map(p=>`<div class="mcard"><div class="card-head">${logoSVG(p.logo,24)} ${esc(p.teamName)} <span style="font-size:11px;font-weight:400;color:#94afd4;margin-left:6px">${esc(p.name)}</span></div><div class="card-body"><div class="tbadges" style="margin-bottom:12px">${p.teams.map(t=>`<span class="badge ${TC[t.tier]}">${t.f} ${esc(t.n)}</span>`).join('')}</div><div class="grid2"><div><label class="lbl">Top scorer <span class="badge ba">+${S.rules.sReg}pts/goal</span></label><input type="text" value="${esc(p.picks.reg)}" oninput="upPick(${p.id},'reg',this.value)" placeholder="e.g. Mbappé"></div><div><label class="lbl">Tier C scorer <span class="badge bc">+${S.rules.sTierC}pts/goal</span></label><input type="text" value="${esc(p.picks.tierC)}" oninput="upPick(${p.id},'tierC',this.value)" placeholder="Tier C striker"></div></div></div></div>`).join('')}</div>`;
}

function renderRules(){
  const r=S.rules;
  const admin=isAdmin();
  const ro=!admin;
  const roMsg=ro?`<div style="background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.25);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518">🔒 Rules can only be edited by the admin. Log in with the admin PIN to make changes.</div>`:'';
  const val=(v)=>ro?`<span style="font-family:'Anton',Impact,sans-serif;color:#f5c518;font-size:18px;padding:0 10px">${v}</span>`:null;
  const tr=(tier,lbl)=>`<div class="rrow"><span class="badge ${TC[tier]}" style="font-size:11px;padding:3px 9px;min-width:125px">${lbl}</span>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Win</label>${ro?val(r[tier].W):`<input type="number" class="pts" value="${r[tier].W}" onchange="upRule('${tier}.W',this.value)" min="0" max="20">`}</div>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Draw</label>${ro?val(r[tier].D):`<input type="number" class="pts" value="${r[tier].D}" onchange="upRule('${tier}.D',this.value)" min="0" max="20">`}</div>
    <div class="rpts"><label style="font-size:11px;color:#94afd4">Loss</label>${ro?val(r[tier].L):`<input type="number" class="pts" value="${r[tier].L}" onchange="upRule('${tier}.L',this.value)" min="0" max="20">`}</div>
  </div>`;
  const teamOpts=ALL_TEAMS.map(t=>`<option value="${esc(t.n)}">${t.f} ${esc(t.n)}</option>`).join('');
  const notifStatus=Notification.permission==='granted'?'<span style="color:#4ade80">✓ Notifications active</span>':Notification.permission==='denied'?'<span style="color:#f87171">✗ Blocked — enable in browser settings</span>':'<span style="color:#94afd4">Not yet enabled</span>';
  const fixtureList=S.matches.length?S.matches.map(m=>{
    const ko=m.kickoff?new Date(m.kickoff).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'TBC';
    const resultHtml=m.hScore!=null?`<span style="font-family:'Anton',Impact,sans-serif;font-size:13px;color:#f5c518">${m.hScore} - ${m.aScore}</span>`:
    admin?`<div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" max="20" class="pts" id="rh${m.id}" placeholder="H" style="width:44px"><span style="color:#5a7ab4">-</span><input type="number" min="0" max="20" class="pts" id="ra${m.id}" placeholder="A" style="width:44px"><button class="btn-sm" onclick="enterResult('${m.id}')">Enter</button></div>`:'<span style="font-family:\'Oswald\',sans-serif;font-size:12px;color:#5a7ab4">Awaiting result</span>';
    return`<div style="padding:10px 0;border-bottom:1px solid rgba(30,58,128,.4);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:600">${m.homeF} ${esc(m.home)} vs ${esc(m.away)} ${m.awayF}</div><div style="font-size:11px;color:#5a7ab4;letter-spacing:1px;font-family:'Oswald',sans-serif;margin-top:2px">${ko}</div></div><div style="display:flex;align-items:center;gap:8px">${resultHtml}${admin?`<button class="btn-sm btn-sm-red" onclick="delMatch('${m.id}')" style="font-size:11px">✕</button>`:''}</div></div>`;
  }).join(''):`<p style="font-family:'Oswald',sans-serif;font-size:13px;color:#5a7ab4;padding:12px 0">No fixtures added yet.</p>`;
  return `
  ${roMsg}
  <div class="mcard"><div class="card-head">⚽ Match Points by Tier</div><div style="padding:0 16px">${tr('A','★★★ Tier A — Elite')}${tr('B','★★ Tier B — Mid')}${tr('C','★ Tier C — Underdog')}</div></div>
  <div class="mcard"><div class="card-head">⚽ Scorer Picks</div><div class="card-body" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
    <div class="rpts"><span class="badge ba" style="font-size:11px">Regular</span>${ro?val(r.sReg):`<input type="number" class="pts" value="${r.sReg}" onchange="upRule('sReg',this.value)" min="0" max="30">`}<span>pts/goal</span></div>
    <div class="rpts"><span class="badge bc" style="font-size:11px">Tier C</span>${ro?val(r.sTierC):`<input type="number" class="pts" value="${r.sTierC}" onchange="upRule('sTierC',this.value)" min="0" max="30">`}<span>pts/goal</span></div>
  </div></div>
  <div class="mcard"><div class="card-head">🏆 Tournament Winner Bonus</div><div class="card-body" style="display:flex;align-items:center;gap:12px">${ro?val(r.winner):`<input type="number" class="pts" value="${r.winner}" onchange="upRule('winner',this.value)" min="0" max="100">`}<span style="font-family:'Oswald',sans-serif;font-size:13px;color:#94afd4">bonus pts for player whose team wins</span></div></div>
  <div class="mcard"><div class="card-head">📋 Custom Rules</div><div style="padding:0 16px">${r.custom.length?r.custom.map(c=>`<div class="crule"><span style="font-family:'Oswald',sans-serif;font-size:14px;flex:1;color:#d4e4ff;line-height:1.5">${esc(c.t)}</span><span style="font-size:11px;color:#5a7ab4;white-space:nowrap">${c.d}</span>${admin?`<button onclick="delRule(${c.id})" style="font-size:11px;color:#f87171;border:none;background:none;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;padding:0">REMOVE</button>`:''}</div>`).join(''):`<p style="font-family:'Oswald',sans-serif;font-size:13px;color:#5a7ab4;padding:12px 0">No custom rules yet.</p>`}${admin?`</div><div style="padding:10px 16px;border-top:1px solid rgba(30,58,128,.4);display:flex;gap:8px"><input type="text" id="cri" placeholder="Add a custom rule" style="flex:1"><button class="btn-sm" onclick="addRule()">Add</button>`:''}</div></div>
  ${admin?`<button id="srb" class="btn-gold" onclick="saveRules()" style="margin-bottom:20px">Save Rules</button>`:''}
  <div class="mcard"><div class="card-head">🔔 Notifications</div><div class="card-body">
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:#94afd4;margin-bottom:10px;line-height:1.5">Browser notifications fire when a result is entered or a scorer is logged.</p>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div style="font-family:'Oswald',sans-serif;font-size:13px">${notifStatus}</div>${Notification.permission!=='granted'?`<button class="btn-sm" onclick="reqNotif()">Enable Notifications</button>`:''}</div>
    ${Notification.permission==='granted'&&admin?`<hr class="sep"><div style="font-family:'Anton',Impact,sans-serif;font-size:11px;letter-spacing:2px;color:#f5c518;margin-bottom:10px">Log a Goal</div><div style="display:flex;gap:8px;flex-wrap:wrap"><input type="text" id="gs" placeholder="Scorer name e.g. Mbappé" style="flex:1;min-width:140px"><select id="gt" style="width:auto;flex-shrink:0"><option value="">Team (optional)</option>${teamOpts}</select><button class="btn-sm" onclick="logGoal()">Log Goal</button></div>`:''}
  </div></div>
  <div class="mcard"><div class="card-head">🗓️ Fixtures ${admin?'':' <span style="font-size:11px;color:#5a7ab4;font-weight:400;font-family:\'Oswald\',sans-serif">(admin only to add)</span>'}</div>
    ${admin?`<div style="padding:12px 16px;border-bottom:1px solid rgba(30,58,128,.4)"><div style="font-family:'Anton',Impact,sans-serif;font-size:11px;letter-spacing:2px;color:#f5c518;margin-bottom:10px">Add Fixture</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label class="lbl">Home</label><select id="mh"><option value="">Select team</option>${teamOpts}</select></div><div><label class="lbl">Away</label><select id="ma"><option value="">Select team</option>${teamOpts}</select></div><div><label class="lbl">Date</label><input type="date" id="md" style="color-scheme:dark"></div><div><label class="lbl">Kick-off</label><input type="time" id="mt" style="color-scheme:dark"></div></div><button class="btn-sm" onclick="addMatch()">Add Fixture</button></div>`:''}
    <div style="padding:0 16px">${fixtureList}</div>
  </div>`;
}

init();
</script>
</body>
</html>
