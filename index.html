</style>

const dl=ms=>new Promise(r=>setTimeout(r,ms));
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function autoInit(name){const w=(name||'').trim().split(/\s+/).filter(Boolean);return w.length>1?w.slice(0,2).map(x=>x[0]).join('').toUpperCase():(name||'??').substring(0,2).toUpperCase();}

          teamName:p.teamName||`Team ${p.id+1}`,pin:p.pin||''

        Object.assign(S,{phase:d.phase||'setup',onboardScreen:d.onboardScreen||'home',names:d.names||S.names,teamNames:d.teamNames||S.teamNames,
          pins:d.pins||S.pins,adminPin:d.adminPin||'0260',adminLoggedIn:d.adminLoggedIn||false,leaguePin:d.leaguePin||'',registrations:Array.isArray(d.registrations)?d.registrations:[],sh:d.sh||null,dr:d.dr||0,dp:d.dp||0,players,

          todayMyView:d.todayMyView!==false,leaderboardAdv:d.leaderboardAdv||false});
      }
    }

    console.warn('localStorage corruption detected — clearing and starting fresh',e);

  // Init Supabase client immediately so it's ready for any screen
  sb=window.supabase?.createClient(SB_URL,SB_KEY);
  // Render with current login state (could be logged in or null)
  render();
  // Bootstrap from Supabase — handles new devices and cross-device sync
  initSupabase().then(()=>{
    // If Supabase has players but local state thinks we're in setup, switch to done
    if(S.phase==='setup'&&S.players&&S.players.length>0){
      S.phase='done';sv();render();
    }
    // Pre-match alert: any of MY teams playing in next 60 mins?
    showPreMatchAlertIfNeeded();
    // Unseen match results for the current logged-in player
    setTimeout(showPendingResults,800);
  });
  // RELIABILITY: re-sync data when user returns to the tab
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&sb){
      Promise.all([syncMatches(),syncGoals(),loadPlayersFromSB(),loadRulesFromSB()]).then(()=>{
        recalcPoints();
        setTimeout(showPendingResults,500);
        render();
      });
      showPreMatchAlertIfNeeded();
    }
  });
  // RELIABILITY: re-sync on window focus too (some browsers don't fire visibilitychange reliably)
  window.addEventListener('focus',()=>{
    if(sb&&Date.now()-lastSyncAt>60000){
      Promise.all([syncMatches(),syncGoals(),loadPlayersFromSB(),loadRulesFromSB()]).then(()=>{recalcPoints();render();});
    }
  });
}

function showWhatIf(mid){
  const m=S.matches.find(x=>x.id===mid||x.id===+mid);

  const hO=S.players.find(p=>p.teams?.some(t=>t.n===m.home));
  const aO=S.players.find(p=>p.teams?.some(t=>t.n===m.away));
  const hTier=hO?.teams?.find(t=>t.n===m.home)?.tier;
  const aTier=aO?.teams?.find(t=>t.n===m.away)?.tier;
  const hR=hTier?S.rules[hTier]:null;
  const aR=aTier?S.rules[aTier]:null;
  // Current standings
  const cur=S.players.map(p=>({id:p.id,name:p.name,teamName:p.teamName,logo:p.logo,total:(p.matchPts||0)+(p.scorerPts||0)})).sort((a,b)=>b.total-a.total);
  const curRank=Object.fromEntries(cur.map((p,i)=>[p.id,i+1]));
  // Three scenarios
  const scenarios=[
    {label:`${esc(m.home)} wins`,flag:m.homeF,delta:{[hO?.id]:hR?.W||0,[aO?.id]:aR?.L||0}},
    {label:'Draw',flag:'⚖️',delta:{[hO?.id]:hR?.D||0,[aO?.id]:aR?.D||0}},
    {label:`${esc(m.away)} wins`,flag:m.awayF,delta:{[hO?.id]:hR?.L||0,[aO?.id]:aR?.W||0}}
  ];
  document.querySelectorAll('.whatif-overlay').forEach(o=>o.remove());
  const o=document.createElement('div');
  o.className='whatif-overlay profile-overlay';
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);overflow-y:auto';
  o.onclick=(e)=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div style="background:var(--th-card);border:1px solid rgba(96,165,250,.4);border-radius:12px;max-width:480px;width:100%;padding:22px;margin:auto">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#60a5fa;letter-spacing:2px">🔮 WHAT IF...</div>
        <div style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);margin-top:2px">${m.homeF} ${esc(m.home)} vs ${esc(m.away)} ${m.awayF}</div>
      </div>
      <button onclick="this.closest('.whatif-overlay').remove()" style="background:none;border:none;color:var(--th-muted);font-size:22px;cursor:pointer;padding:0 4px">×</button>
    </div>
    ${scenarios.map(sc=>{
      const projected=cur.map(p=>({...p,total:p.total+(sc.delta[p.id]||0)})).sort((a,b)=>b.total-a.total);
      const changes=projected.map((p,i)=>{
        const newRank=i+1;
        const oldRank=curRank[p.id];
        const diff=oldRank-newRank;
        const gained=sc.delta[p.id]||0;
        if(!gained&&diff===0)return null;
        const arrow=diff>0?`<span style="color:#4ade80">▲${diff}</span>`:diff<0?`<span style="color:#f87171">▼${-diff}</span>`:'';
        return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-family:'Oswald',sans-serif;font-size:12px">

  </div>`;
  document.body.appendChild(o);
}

function showPendingResults(){
  if(S.loggedIn==null||!S.players||!S.matches)return;
  const me=S.players[S.loggedIn];if(!me)return;
  // Gate: show What's New first if not yet seen by this player
  const wnKey='wc26x_seenWhatsNew_v2';
  const wnSeen=JSON.parse(localStorage.getItem(wnKey)||'{}');
  if(!wnSeen[me.name]){
    showWhatsNew(()=>{
      wnSeen[me.name]=true;
      try{localStorage.setItem(wnKey,JSON.stringify(wnSeen));}catch(_){}
      setTimeout(showPendingResults,300);
    });
    return;
  }
  const myTeams=new Set((me.teams||[]).map(t=>t.n));
  const seen=JSON.parse(localStorage.getItem('wc26x_seenResults_v2')||'{}');
  const meSeen=seen[me.name]||[];
  // Find finished matches involving my teams, within last 7 days, not yet seen
  const now=Date.now();
  const candidates=S.matches.filter(m=>{
    if(!isMatchOver(m))return false;
    if(!m.kickoff)return false;
    if(now-new Date(m.kickoff).getTime()>7*24*60*60*1000)return false;
    if(!myTeams.has(m.home)&&!myTeams.has(m.away))return false;
    if(meSeen.includes(String(m.id)))return false;
    return true;
  }).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
  if(!candidates.length)return;
  // Show first one in queue; subsequent ones show after dismissing the previous
  showResultModal(candidates[0],()=>{
    const s2=JSON.parse(localStorage.getItem('wc26x_seenResults_v2')||'{}');
    s2[me.name]=[...(s2[me.name]||[]),String(candidates[0].id)];
    try{localStorage.setItem('wc26x_seenResults_v2',JSON.stringify(s2));}catch(_){}
    // Recurse to show the next one
    setTimeout(showPendingResults,300);
  });
}

function showPreMatchAlertIfNeeded(){
  if(S.loggedIn==null||!S.players||!S.matches)return;
  const me=S.players[S.loggedIn];if(!me)return;
  const myTeams=new Set(me.teams.map(t=>t.n));
  const now=Date.now();
  // matches within next 60 mins where I own a side
  const upcoming=S.matches.filter(m=>{
    if(m.hScore!=null)return false;
    const ko=new Date(m.kickoff).getTime();
    return ko>now&&ko-now<=60*60*1000&&(myTeams.has(m.home)||myTeams.has(m.away));
  });
  if(!upcoming.length)return;
  // Dedup: don't repeat alerts within 30 mins for same match
  const shown=JSON.parse(localStorage.getItem('wc26x_prealert')||'{}');
  upcoming.forEach(m=>{
    const last=shown[m.id]||0;
    if(now-last<30*60*1000)return;
    const myTeam=myTeams.has(m.home)?m.home:m.away;
    const oppTeam=myTeam===m.home?m.away:m.home;
    const mins=Math.round((new Date(m.kickoff).getTime()-now)/60000);
    showPreMatchToast(myTeam,oppTeam,mins);
    shown[m.id]=now;
  });
  try{localStorage.setItem('wc26x_prealert',JSON.stringify(shown));}catch(_){}
}
function showPreMatchToast(team,opp,mins){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:18px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#0c1b3a,#0a1226);border:2px solid #f5c518;border-radius:10px;padding:14px 22px;z-index:9998;box-shadow:0 12px 40px rgba(0,0,0,.7);font-family:\'Anton\',Impact,sans-serif;color:#f5c518;letter-spacing:1.5px;font-size:14px;text-align:center;animation:slideDown .4s ease both;cursor:pointer';
  t.innerHTML=`⚽ KICKOFF IN ${mins}m<div style="font-family:'Oswald',sans-serif;font-size:13px;color:#fff;font-weight:400;letter-spacing:.5px;margin-top:4px">${esc(team)} vs ${esc(opp)}</div>`;
  t.onclick=()=>{S.tab='today';render();t.remove();};
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .5s';setTimeout(()=>t.remove(),500);},8000);
}

function logoSVG(logo={},size=80){
  const {shape='shield',bg='#cc0000',accent='#ffd700',textColor,symbol='⭐',initials='FC',initialsPos='bottom',stars=0}=logo;
  const tc=textColor||accent;
  let sh='';
  if(shape==='shield')sh=`<path d="M12,10 L88,10 L88,56 Q88,88 50,97 Q12,88 12,56 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='circle')sh=`<circle cx="50" cy="50" r="40" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='hexagon')sh=`<path d="M50,8 L86,29 L86,71 L50,92 L14,71 L14,29 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='diamond')sh=`<path d="M50,8 L92,50 L50,92 L8,50 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='pentagon')sh=`<path d="M50,8 L90,36 L75,86 L25,86 L10,36 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='oval')sh=`<ellipse cx="50" cy="50" rx="42" ry="34" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='crest')sh=`<path d="M50,8 L88,8 L88,52 Q88,76 68,86 Q59,91 50,94 Q41,91 32,86 Q12,76 12,52 L12,8 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='star')sh=`<path d="M50,6 L61,36 L93,36 L68,56 L77,88 L50,69 L23,88 L32,56 L7,36 L39,36 Z" fill="${bg}" stroke="${accent}" stroke-width="2.5"/>`;
  else if(shape==='arch')sh=`<path d="M12,12 Q12,8 50,6 Q88,8 88,12 L88,68 Q88,90 50,96 Q12,90 12,68 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;
  else if(shape==='badge')sh=`<path d="M50,7 L84,20 L88,56 Q86,80 50,96 Q14,80 12,56 L16,20 Z" fill="${bg}" stroke="${accent}" stroke-width="3"/>`;

  // Safe zones per shape — inset from stroke
  const cy=50;
  // Bottom initials y — well inset from bottom edge
  const ib={shield:88,circle:86,hexagon:86,diamond:84,pentagon:82,oval:78,crest:88,star:82,arch:88,badge:88}[shape]||84;
  // Top initials y
  const it={shield:22,circle:20,hexagon:20,diamond:22,pentagon:16,oval:26,crest:20,star:16,arch:18,badge:18}[shape]||20;
  // Horizontal safe zone for split-h — generous inset
  const lx={shield:28,circle:26,hexagon:28,diamond:36,pentagon:28,oval:26,crest:26,star:34,arch:26,badge:28}[shape]||28;
  const rx={shield:76,circle:74,hexagon:72,diamond:64,pentagon:72,oval:74,crest:74,star:66,arch:74,badge:72}[shape]||72;

  const iStr=(initials||'').toUpperCase().substring(0,4);
  // Scale font size down for longer initials and narrow shapes
  const baseFontSize=iStr.length<=2?11:iStr.length===3?9.5:8.5;
  const narrowShapes=['diamond','star'];
  const fs=narrowShapes.includes(shape)?baseFontSize-1.5:baseFontSize;

  let initEls='';
  if(iStr){
    if(initialsPos==='bottom'){
      initEls=`<text x="50" y="${ib}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr)}</text>`;
    }else if(initialsPos==='top'){
      initEls=`<text x="50" y="${it}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr)}</text>`;
    }else if(initialsPos==='split-v'){
      const h=Math.ceil(iStr.length/2);
      initEls=`<text x="50" y="${it}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr.substring(0,h))}</text><text x="50" y="${ib}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${fs}" fill="${tc}" letter-spacing="0.5">${esc(iStr.substring(h))}</text>`;
    }else if(initialsPos==='split-h'){
      const h=Math.ceil(iStr.length/2);
      const hfs=fs-0.5;
      initEls=`<text x="${lx}" y="${cy+4}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${hfs}" fill="${tc}">${esc(iStr.substring(0,h))}</text><text x="${100-lx}" y="${cy+4}" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="${hfs}" fill="${tc}">${esc(iStr.substring(h))}</text>`;
    }
  }

  const symbolEl=symbol?`<text x="50" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="${iStr&&(initialsPos==='split-v'||initialsPos==='bottom'||initialsPos==='top')?22:26}">${symbol}</text>`:'';

  const starCount=Math.min(+stars||0,5);
  const starH=starCount>0?18:0;
  const totalH=100+starH;
  const sc=logo.starColor||tc;
  const starsEl=starCount>0?`<text x="50" y="${starH-3}" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="${sc}" letter-spacing="3">${'★'.repeat(starCount)}</text>`:'';
  return `<svg viewBox="0 0 100 ${totalH}" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${Math.round(size*(totalH/100))}" style="overflow:visible">${starsEl}<g transform="translate(0,${starH})">${sh}${symbolEl}${initEls}</g></svg>`;
}

// ===== DRAW =====
function startDraw(){
  if(S.registrations&&S.registrations.length>=2){
    S.names=S.registrations.map(r=>r.name);
    S.teamNames=S.registrations.map(r=>r.teamName);
    S.pins=S.registrations.map(r=>r.pin);
  }
  const filled=S.names.filter((n,i)=>n&&!n.startsWith('Player ')&&S.pins[i]&&S.pins[i].length>=4);
  if(filled.length<2){alert('Each player needs a name and a 4-digit PIN before starting the draw.');return;}
  const missingPins=S.names.filter((n,i)=>n&&!n.startsWith('Player ')&&(!S.pins[i]||S.pins[i].length<4));
  if(missingPins.length>0){alert(`Missing PINs for: ${missingPins.join(', ')}. Everyone needs a 4-digit PIN.`);return;}
  S.sh={A1:shuf(TM.A1),A2:shuf(TM.A2),B:shuf(TM.B),C:shuf(TM.C)};S.dr=0;S.dp=0;S.rs='idle';S.phase='draw';sv();render();
}
function getTeam(){
  const{tier,pick}=RI[S.dr];
  if(tier==='A1'||tier==='A2') return{...S.sh[tier][S.dp],tier:'A'};
  return{...S.sh[tier][S.dp*2+pick],tier};
}
async function clickReveal(){
  if(S.rs!=='idle')return;
  S.rs='loading';render();
  const tm=getTeam();S.cur=tm;
  S.clues=CLUES[tm.n]||['A proud footballing nation','Battled hard to reach this stage','One of 48 teams chasing glory'];
  await dl(500);S.rs='c1';render();
  await dl(2200);S.rs='c2';render();
  await dl(2200);S.rs='c3';render();
  await dl(2600);S.rs='done';render();
}
function adv(){
  S.rs='idle';S.clues=[];S.cur=null;S.dp++;
  if(S.dp>=8){S.dp=0;S.dr++;}
  if(S.dr>=6){
    S.players=S.names.map((name,i)=>({
      id:i,name,teamName:S.teamNames[i]||`Team ${i+1}`,pin:S.pins[i]||'',
      teams:[{...S.sh.A1[i],tier:'A'},{...S.sh.A2[i],tier:'A'},{...S.sh.B[i*2],tier:'B'},{...S.sh.B[i*2+1],tier:'B'},{...S.sh.C[i*2],tier:'C'},{...S.sh.C[i*2+1],tier:'C'}],
      picks:{reg:'',tierC:''},kit:{...DK},logo:{...DL,initials:autoInit(S.teamNames[i]||`Team ${i+1}`)},boots:'predator',bootC1:'#b00',bootC2:'#fff',matchPts:0,scorerPts:0
    }));
    S.phase='done';
    sv();render();
    // Wait up to 3s for sb to be ready then push
    const tryPush=async()=>{
      for(let i=0;i<10;i++){if(sb)break;await new Promise(r=>setTimeout(r,300));}
      if(!sb){showSaveBanner('⚠️ No connection — tap to retry',true,tryPush);return;}
      try{
        const payload=S.players.map(p=>({
          id:p.id,name:p.name,team_name:p.teamName,pin:p.pin,
          theme:p.theme||'navy',teams:p.teams,picks:p.picks||{reg:'',tierC:''},
          kit:p.kit||{...DK},logo:p.logo||{...DL},boots:p.boots||'predator',
          boot_c1:p.bootC1||'#b00',boot_c2:p.bootC2||'#fff',
          match_pts:0,scorer_pts:0,win_message:p.winMessage||null
        }));
        const{error}=await sb.from('players').upsert(payload);
        if(error){console.error('Push error:',error);showSaveBanner('⚠️ Save failed — tap to retry',true,tryPush);return;}
        const{data}=await sb.from('players').select('id,pin').eq('pin',S.players[0].pin).limit(1);
        if(data&&data.length>0){showSaveBanner('✅ All players saved — everyone can now log in',false);}
        else{showSaveBanner('⚠️ Save failed — tap to retry',true,tryPush);}
      }catch(e){console.error('Push exception:',e);showSaveBanner('⚠️ Error saving — tap to retry',true,tryPush);}
    };
    tryPush();
  }
  sv();render();
}
// ===== BACKUP & AUTO-SNAPSHOT =====
async function downloadBackup(){
  try{
    let snapshot={
      timestamp:new Date().toISOString(),
      version:'wc26x-backup-v1',
      localState:JSON.parse(localStorage.getItem('wc26x')||'{}'),
    };
    if(sb){
      try{
        const[players,predictions,messages,settings]=await Promise.all([
          sb.from('players').select('*'),
          sb.from('predictions').select('*'),
          sb.from('messages').select('*'),
          sb.from('settings').select('*'),
        ]);
        snapshot.supabase={
          players:players.data,
          predictions:predictions.data,
          messages:messages.data,
          settings:settings.data,
        };
      }catch(e){console.warn('Supabase backup partial',e);}
    }
    const blob=new Blob([JSON.stringify(snapshot,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`wc2026-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('Backup failed: '+e.message);}
}

function restoreFromFile(event){
  const file=event.target.files?.[0];
  if(!file)return;
  if(!confirm('Restore from this backup file? This will overwrite local state. Supabase data will not change.'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.version!=='wc26x-backup-v1'){alert('Invalid backup file.');return;}
      if(data.localState){
        localStorage.setItem('wc26x',JSON.stringify(data.localState));
        alert('Local state restored. Reloading...');
        location.reload();
      }
    }catch(err){alert('Could not parse backup file.');}
  };
  reader.readAsText(file);
}

function autoSnapshot(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const snap={date:today,data:localStorage.getItem('wc26x')};
    let snaps=[];
    try{snaps=JSON.parse(localStorage.getItem('wc26x_snapshots')||'[]');}catch(e){}
    // Skip if today's snapshot already exists
    if(snaps.some(s=>s.date===today))return;
    snaps.push(snap);
    // Keep last 7 days only
    if(snaps.length>7)snaps=snaps.slice(-7);
    localStorage.setItem('wc26x_snapshots',JSON.stringify(snaps));
  }catch(e){}
}

function getLatestSnapshotInfo(){
  try{
    const snaps=JSON.parse(localStorage.getItem('wc26x_snapshots')||'[]');
    if(!snaps.length)return 'No snapshots yet';
    return `${snaps.length} snapshot${snaps.length>1?'s':''} stored (last: ${snaps[snaps.length-1].date})`;
  }catch(e){return 'No snapshots yet';}
}

// Run auto-snapshot once per session, after init
setTimeout(autoSnapshot,3000);

  if(S.phase==='done'&&!isAdmin()){alert('Only the admin can reset the draw.');return;}
  if(!confirm('Reset everything? A backup will be saved first.'))return;
  try{localStorage.setItem('wc26x_backup',localStorage.getItem('wc26x'));}catch(e){}
  try{
    localStorage.removeItem('wc26x');
    localStorage.removeItem('wc26x_unread');
  }catch(e){}
  // Wipe Supabase too
  if(sb){
    sb.from('players').delete().neq('id',-1).then(()=>{});
    sb.from('predictions').delete().neq('id',-1).then(()=>{});
    sb.from('messages').delete().neq('id',-1).then(()=>{});
    sb.from('settings').delete().neq('key','').then(()=>{});
  }
  Object.assign(S,{
    phase:'setup',onboardScreen:'home',

}
function restoreBackup(){
  if(!isAdmin()){alert('Only the admin can restore a backup.');return;}
  try{
    const bk=localStorage.getItem('wc26x_backup');

function scorePred(ph,pa,ah,aa){
  if(ph==null||pa==null)return{pts:0,type:'none'};
  if(+ph===+ah&&+pa===+aa)return{pts:4,type:'correct'};
  const pr=+ph>+pa?'H':+ph<+pa?'A':'D',ar=+ah>+aa?'H':+ah<+aa?'A':'D';
  if(pr===ar)return{pts:2,type:'result'};
  return{pts:0,type:'wrong'};
}
function getPredTotal(pid){
  let correct=0,result=0,wrong=0,total=0;
  S.matches.forEach(m=>{
    if(!isMatchOver(m))return;
    const pred=S.predictions[pid]?.[m.id];if(!pred)return;
    const{pts,type}=scorePred(pred.h,pred.a,m.hScore,m.aScore);
    total+=pts;if(type==='correct')correct++;else if(type==='result')result++;else if(type==='wrong')wrong++;
  });
  return{correct,result,wrong,total};
}

function notifWin(m){
  if(!S.players)return;

      const won=(t.n===m.home&&m.hScore>m.aScore)||(t.n===m.away&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      const pts=won?(t.tier==='A'?S.rules.A.W:t.tier==='B'?S.rules.B.W:S.rules.C.W):(drew?(t.tier==='A'?S.rules.A.D:t.tier==='B'?S.rules.B.D:S.rules.C.D):0);
      if(won)fireNotif(`⚽ ${esc(t.n)} won! +${pts}pts`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)}'s team picks up points!`);
      else if(drew&&pts>0)fireNotif(`${esc(t.n)} drew`,`${m.home} ${m.hScore}-${m.aScore} ${m.away} — ${esc(p.name)} gets ${pts}pts`);
    });
  });
}

      id:m.id,home:canonicalTeam(m.home),away:canonicalTeam(m.away),
      homeF:ALL_TEAMS.find(t=>t.n===canonicalTeam(m.home))?.f||'',
      awayF:ALL_TEAMS.find(t=>t.n===canonicalTeam(m.away))?.f||'',
      kickoff:m.kickoff,
      hScore:m.home_score??null,
      aScore:m.away_score??null,
      round:m.round||null,stage:m.stage||null,
      // Live status from API-Football (null if poll.js hasn't been updated yet)
      statusShort:m.status_short||null,
      statusElapsed:m.status_elapsed??null,
      statusExtra:m.status_extra??null
    }));
    lastSyncAt=Date.now();
    recalcPoints();
    sv();render();
  }catch(e){console.warn('syncMatches failed',e);}
}

// Returns true ONLY if we have confirmed (via API status) that the match has ended.
// A non-null score does NOT mean finished — it could be a live score (e.g. 1-1 in the 60th min).
// Falls back to a generous 3-hour-after-kickoff window if status data isn't available,
// since marking predictions ✗ prematurely (while a match is still live) is worse than
// briefly delaying the ✗/✓ marker after a match genuinely ends.
function isMatchOver(m){
  if(!m)return false;
  if(m.statusShort)return['FT','AET','PEN','PST','CANC','ABD','AWD','WO'].includes(m.statusShort);
  if(m.hScore==null)return false;
  const kickoff=new Date(m.kickoff).getTime();
  // Realistic max duration: 90min + 15min HT + stoppage ≈ 110min for normal time,
  // up to 120min+pens for knockouts with ET. 2hr15min covers both with margin.
  return (Date.now()-kickoff)>=135*60*1000;
}

// Format the official game clock from API-Football status fields.
// Returns null if no live data available, in which case the caller should fall back.
function fmtGameMin(m){
  if(!m||!m.statusShort)return null;
  const e=m.statusElapsed,x=m.statusExtra;
  const minWithStoppage=()=>x?`${e}+${x}'`:e!=null?`${e}'`:'';
  switch(m.statusShort){
    case '1H':case '2H':case 'ET':case 'LIVE':return minWithStoppage();
    case 'HT':return 'HT';
    case 'BT':return 'Break';
    case 'P':case 'PEN':return 'Pens';
    case 'FT':return 'FT';
    case 'AET':return 'AET';
    case 'SUSP':return 'SUSP';
    case 'INT':return 'INT';
    case 'PST':return 'PST';
    case 'ABD':return 'ABD';
    case 'CANC':return 'CANC';
    case 'NS':case 'TBD':return null;
    default:return e!=null?`${e}'`:null;
  }
}

// Map API/external team names to canonical internal names
const TEAM_ALIASES={
  'Bosnia & Herzegovina':'Bosnia & Herz.',
  'Bosnia-Herzegovina':'Bosnia & Herz.',
  'Bosnia and Herzegovina':'Bosnia & Herz.',
  'United States':'USA',
  'United States of America':'USA',
  'US':'USA',
  'Korea Republic':'South Korea',
  'Republic of Korea':'South Korea',
  'Korea':'South Korea',
  'Czech Republic':'Czechia',
  'Turkey':'Türkiye',
  'Cote d\'Ivoire':'Ivory Coast',
  "Côte d'Ivoire":'Ivory Coast',
  'Cabo Verde':'Cape Verde',
  'Curacao':'Curaçao',
  'Congo DR':'DR Congo',
  'DR of Congo':'DR Congo',
  'Democratic Republic of the Congo':'DR Congo',
  'Iran Islamic Republic':'Iran',
  'IR Iran':'Iran'
};
function canonicalTeam(n){
  if(!n)return n;
  // Don't try to canonicalize placeholder names like "Winner Match 123" or "TBD - ..."
  if(/^(TBD|Winner|Runner-up|Loser|3rd Place)/i.test(n.trim()))return n;
  // Direct alias hit
  if(TEAM_ALIASES[n])return TEAM_ALIASES[n];
  // Try matching ALL_TEAMS directly
  if(ALL_TEAMS.find(t=>t.n===n))return n;
  // Last resort: case-insensitive contains match against canonical names
  const lc=n.toLowerCase();
  const match=ALL_TEAMS.find(t=>t.n.toLowerCase()===lc||lc.includes(t.n.toLowerCase())||t.n.toLowerCase().includes(lc));
  return match?match.n:n;
}

function namesMatch(picked,scored){
  if(!picked||!scored)return false;
  // Normalise: lowercase, strip accents, trim, remove dots
  const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\./g,'').trim();
  const p=norm(picked);
  const s=norm(scored);
  if(p===s)return true;
  const pTokens=p.split(/\s+/).filter(Boolean);
  const sTokens=s.split(/\s+/).filter(Boolean);
  if(!pTokens.length||!sTokens.length)return false;
  // Surname (last token) must match
  const pSurname=pTokens[pTokens.length-1];
  const sSurname=sTokens[sTokens.length-1];
  if(pSurname!==sSurname)return false;
  // If both have a first name/initial, the first letters must match
  // e.g. "kylian mbappe" vs "k mbappe" → both start with k → match
  // e.g. "kylian mbappe" vs "junior mbappe" → k vs j → no match
  if(pTokens.length>=2&&sTokens.length>=2){
    if(pTokens[0][0]===sTokens[0][0])return true;
    return false;
  }
  // Single-name match (rare, only one side has full name)
  return true;
}

async function syncGoals(){
  if(!sb)return;
  try{
    const{data}=await sb.from('goals').select('*');
    if(!data)return;
    S.goals=data.map(g=>({...g,team:canonicalTeam(g.team)}));
    if(!S.players)return;
    S.players.forEach(p=>{
      p.scorerPts=0;
      S.goals.forEach(g=>{
        if(p.picks.reg&&namesMatch(p.picks.reg,g.player_name)) p.scorerPts+=S.rules.sReg;
        if(p.picks.tierC&&namesMatch(p.picks.tierC,g.player_name)){
          const tm=p.teams.find(t=>t.n===g.team);
          if(tm?.tier==='C') p.scorerPts+=S.rules.sTierC;
        }
      });
    });
    sv();render();
  }catch(e){console.warn('syncGoals failed',e);}
}

function recalcPoints(){
  if(!S.players)return;
  // Build chronological match list (only finished)
  const finished=S.matches.filter(m=>m.hScore!=null).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
  const goals=S.goals||[];
  S.players.forEach(p=>{
    p.matchPts=0;
    p.scorerPts=0;
    // chronological results per player for streak: 'W' / 'D' / 'L'
    const sequence=[];
    finished.forEach(m=>{
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
        const drew=m.hScore===m.aScore;
        const r=S.rules[t.tier]||S.rules.A;
        if(won){p.matchPts+=r.W;sequence.push({r:'W',ko:m.kickoff,team:t.n,tier:t.tier,score:isHome?`${m.hScore}-${m.aScore}`:`${m.aScore}-${m.hScore}`,opponent:isHome?m.away:m.home});}
        else if(drew){p.matchPts+=r.D;sequence.push({r:'D',ko:m.kickoff});}
        else {p.matchPts+=r.L;sequence.push({r:'L',ko:m.kickoff});}
      });
    });
    // Recalculate scorer points from goals
    goals.forEach(g=>{
      if(p.picks?.reg&&namesMatch(p.picks.reg,g.player_name)) p.scorerPts+=S.rules.sReg;
      if(p.picks?.tierC&&namesMatch(p.picks.tierC,g.player_name)){
        const tm=p.teams.find(t=>t.n===g.team);
        if(tm?.tier==='C') p.scorerPts+=S.rules.sTierC;
      }
    });
    // streak = trailing W count
    let streak=0;
    for(let i=sequence.length-1;i>=0;i--){if(sequence[i].r==='W')streak++;else break;}
    p.streak=streak;
    p.lastResults=sequence.slice(-5);
  });
  // Confetti: detect new wins for the logged-in user since last render
  if(S.loggedIn!=null&&S.myPin&&S.players[S.loggedIn]){
    const me=S.players[S.loggedIn];
    const seen=JSON.parse(localStorage.getItem('wc26x_seen_wins_'+S.myPin)||'[]');
    const newWins=(me.lastResults||[]).filter(r=>r.r==='W'&&!seen.includes(r.ko));
    if(newWins.length>0&&typeof confetti!=='undefined'){
      newWins.forEach((w,i)=>{
        setTimeout(()=>{
          confetti({particleCount:120,spread:80,origin:{y:0.5},colors:['#f5c518','#ffe566','#fff','#4ade80']});
          showWinToast(w);
        },i*900);
      });
      // Mark as seen
      const allWins=[...seen,...newWins.map(w=>w.ko)];
      localStorage.setItem('wc26x_seen_wins_'+S.myPin,JSON.stringify(allWins.slice(-50)));
    }
  }
  sv();render();
}

function subscribeRealtime(){
  if(!sb)return;
  try{
    sb.channel('matches-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>{
        syncMatches().then(()=>syncGoals());
      }).subscribe();
    sb.channel('goals-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'goals'},payload=>{
        const g=payload.new;
        if(S.players){
          S.players.forEach(p=>{
            const me=p.id===S.loggedIn;
            if(p.picks.reg&&namesMatch(p.picks.reg,g.player_name)){
              fireNotif(`⚽ ${g.player_name} scored!`,`${esc(p.name)}'s top scorer +${S.rules.sReg}pts`);
              if(me)showGoalToast(g,false);
            }
            if(p.picks.tierC&&namesMatch(p.picks.tierC,g.player_name)){
              const tm=p.teams.find(t=>t.n===g.team);
              if(tm?.tier==='C'){
                fireNotif(`🌟 ${g.player_name} scored!`,`${esc(p.name)}'s Tier C pick +${S.rules.sTierC}pts`);
                if(me)showGoalToast(g,true);
              }
            }
          });
        }
        syncGoals();
      }).subscribe();
  }catch(e){console.warn('Realtime subscribe failed',e);}
}

async function loadPlayersFromSB(){
  if(!sb)return;
  try{
    const{data}=await sb.from('players').select('*').order('id',{ascending:true});
    if(!data||!data.length)return;
    const hydrate=p=>({
      id:p.id,
      name:p.name,
      teamName:p.team_name||`Team ${p.id+1}`,
      pin:p.pin||'',
      theme:p.theme||'navy',
      teams:p.teams||[],
      picks:{reg:p.picks?.reg||'',tierC:p.picks?.tierC||''},
      winMessages:p.picks?._winMessages||{},
      kit:{...DK,...(p.kit||{})},
      logo:{...DL,...(p.logo||{}),initials:p.logo?.initials!==undefined?p.logo.initials:autoInit(p.team_name||p.name),textColor:p.logo?.textColor||'#ffd700'},
      boots:p.boots||'predator',
      bootC1:p.boot_c1||(BOOTS.find(b=>b.id===(p.boots||'predator'))||BOOTS[0]).bg,
      bootC2:p.boot_c2||(BOOTS.find(b=>b.id===(p.boots||'predator'))||BOOTS[0]).accent,
      winMessage:p.win_message||'',
      matchPts:p.match_pts||0,
      scorerPts:p.scorer_pts||0,
    });
    if(!S.players){
      // New device — bootstrap entire player list from Supabase
      S.players=data.map(hydrate);
      S.phase='done';
      sv();render();
      // Also load predictions now we have players
      await loadPredictionsFromSB();
    } else {
      // Merge — update existing players with latest Supabase data
      S.players=S.players.map(p=>{
        const sbp=data.find(x=>x.id===p.id);
        if(!sbp)return p;
        return hydrate(sbp);
      });
    }
    // CRITICAL: recalc points from matches because Supabase columns
    // match_pts/scorer_pts are not authoritative — they're calculated client-side
    // from S.matches + S.goals. Hydration sets them to 0, so we must recalc.
    recalcPoints();
    // SECURITY: do NOT auto-login from saved PIN.
    // This caused other users on shared devices/browsers to be auto-logged in as someone else.
    // Players must always enter their PIN explicitly.
    sv();render();
  }catch(e){console.warn('loadPlayersFromSB failed',e);}
}

async function loadPredictionsFromSB(){

      const pid=S.players?.findIndex(p=>p.name===r.player_name);
      if(pid===-1||pid==null)return;

}

}

function showComparison(p1id,p2id){
  const p1=S.players.find(p=>p.id===p1id);
  const p2=S.players.find(p=>p.id===p2id);
  if(!p1||!p2)return;
  const bd1=getBreakdown(p1),bd2=getBreakdown(p2);
  const t1=(p1.matchPts||0)+(p1.scorerPts||0),t2=(p2.matchPts||0)+(p2.scorerPts||0);
  const ps1=getPredTotal(p1.id),ps2=getPredTotal(p2.id);
  // Build cumulative match-points-over-time series
  const buildSeries=(p)=>{
    const finished=S.matches.filter(m=>m.hScore!=null).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    let cum=0;const pts=[];
    finished.forEach(m=>{
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
        const drew=m.hScore===m.aScore;
        const r=S.rules[t.tier]||S.rules.A;
        cum+=won?r.W:drew?r.D:r.L;
      });
      pts.push({ko:m.kickoff,total:cum});
    });
    return pts;
  };
  const s1=buildSeries(p1),s2=buildSeries(p2);
  // ====== UNIQUE INSIGHT STATS (things you can't see on leaderboard) ======
  const computeInsights=(p)=>{
    const teamsByName=Object.fromEntries(p.teams.map(t=>[t.n,t]));
    let gf=0,ga=0,cleanSheets=0,matchesPlayed=0,wins=0,draws=0,losses=0;
    let tierCWins=0,tierAWins=0,tierBWins=0;
    let comebacks=0,bigWins=0,biggestWinTeam=null,biggestWinScore=0;
    let worstLossTeam=null,worstLossScore=0;
    let teamsActive=new Set(p.teams.map(t=>t.n));
    const finished=S.matches.filter(m=>m.hScore!=null);
    finished.forEach(m=>{
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        matchesPlayed++;
        const my=isHome?m.hScore:m.aScore;
        const opp=isHome?m.aScore:m.hScore;
        gf+=my;ga+=opp;
        if(opp===0)cleanSheets++;
        if(my>opp){
          wins++;
          if(t.tier==='A')tierAWins++;
          else if(t.tier==='B')tierBWins++;
          else if(t.tier==='C')tierCWins++;
          const margin=my-opp;
          if(margin>=3)bigWins++;
          if(margin>biggestWinScore){biggestWinScore=margin;biggestWinTeam=t.n;}
        } else if(my===opp){draws++;}
        else{
          losses++;
          const margin=opp-my;
          if(margin>worstLossScore){worstLossScore=margin;worstLossTeam=t.n;}
        }
      });
    });
    const totalPts=(p.matchPts||0)+(p.scorerPts||0);
    const ppm=matchesPlayed>0?(totalPts/matchesPlayed).toFixed(1):'0.0';
    // % pts from Tier C (risk profile)
    let tierCPts=0,tierAPts=0,tierBPts=0;
    finished.forEach(m=>{
      p.teams.forEach(t=>{
        const isHome=t.n===m.home,isAway=t.n===m.away;
        if(!isHome&&!isAway)return;
        const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
        const drew=m.hScore===m.aScore;
        const r=S.rules[t.tier]||S.rules.A;
        const gained=won?r.W:drew?r.D:r.L;
        if(t.tier==='A')tierAPts+=gained;
        else if(t.tier==='B')tierBPts+=gained;
        else if(t.tier==='C')tierCPts+=gained;
      });
    });
    const riskPct=p.matchPts>0?Math.round(tierCPts/p.matchPts*100):0;
    // Predictions data
    const myPreds=S.predictions?.[p.id]||{};
    const predEntries=Object.entries(myPreds);
    let exactPreds=0,resultPreds=0;
    predEntries.forEach(([mid,pred])=>{
      const m=S.matches?.find(mch=>mch.id===mid||mch.id===+mid);
      if(m&&isMatchOver(m)){
        if(pred.h===m.hScore&&pred.a===m.aScore)exactPreds++;
        else if(Math.sign(pred.h-pred.a)===Math.sign(m.hScore-m.aScore))resultPreds++;
      }
    });
    return{
      gf,ga,gd:gf-ga,cleanSheets,matchesPlayed,wins,draws,losses,
      tierCWins,bigWins,
      biggestWinTeam,biggestWinScore,
      worstLossTeam,worstLossScore,
      ppm,riskPct,tierCPts,
      exactPreds,resultPreds,
      drawRate:matchesPlayed>0?Math.round(draws/matchesPlayed*100):0
    };
  };
  const i1=computeInsights(p1),i2=computeInsights(p2);
  // Compose H2H matchups: matches where both own a side
  const h2hMatches=[];
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    const p1Home=p1.teams.find(t=>t.n===m.home);const p2Home=p2.teams.find(t=>t.n===m.home);
    const p1Away=p1.teams.find(t=>t.n===m.away);const p2Away=p2.teams.find(t=>t.n===m.away);

  });
  const h2hW1=h2hMatches.filter(x=>x.winner===p1.name).length;
  const h2hW2=h2hMatches.filter(x=>x.winner===p2.name).length;
  const h2hD=h2hMatches.filter(x=>x.winner==='Draw').length;
  // Row helper
  const row=(label,v1,v2,better)=>{

    const w1=better==='high'?v1n>v2n:better==='low'?v1n<v2n:false;
    const w2=better==='high'?v2n>v1n:better==='low'?v2n<v1n:false;

function showTeamProfile(teamName){
  if(!teamName)return;
  // Find owner
  const owner=S.players?.find(p=>p.teams?.some(t=>t.n===teamName));
  const team=owner?.teams?.find(t=>t.n===teamName);
  const tier=team?.tier||'?';
  const flag=team?.f||'';
  // Pull all matches involving this team
  const matches=S.matches.filter(m=>m.home===teamName||m.away===teamName).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
  // Stats from finished matches
  let W=0,D=0,L=0,GF=0,GA=0;
  const played=matches.filter(m=>m.hScore!=null);
  played.forEach(m=>{
    const isHome=m.home===teamName;
    const my=isHome?m.hScore:m.aScore;
    const opp=isHome?m.aScore:m.hScore;
    GF+=my;GA+=opp;
    if(my>opp)W++;else if(my===opp)D++;else L++;
  });
  const upcoming=matches.filter(m=>m.hScore==null).slice(0,3);
  const recent=played.slice(-3).reverse();
  // Goal scorers from this team
  const teamGoals=(S.goals||[]).filter(g=>g.team===teamName);
  const goalsByPlayer={};
  teamGoals.forEach(g=>{goalsByPlayer[g.player_name]=(goalsByPlayer[g.player_name]||0)+1;});
  const topScorers=Object.entries(goalsByPlayer).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const fmtScore=m=>`${m.hScore}-${m.aScore}`;
  const fmtKO=ko=>new Date(ko).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' · '+new Date(ko).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  // Tier colour
  const tierBadgeClass=TC[tier]||'ba';
  document.querySelectorAll('.profile-overlay').forEach(o=>o.remove());
  const overlay=document.createElement('div');
  overlay.className='profile-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto';
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`<div style="background:var(--th-sa);max-width:480px;width:100%;border-radius:12px;border:1px solid var(--th-border);padding:22px;position:relative;max-height:90vh;overflow-y:auto">
    <button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--th-secondary);font-size:24px;cursor:pointer;line-height:1">×</button>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div style="font-size:42px;line-height:1">${flag}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:24px;color:#f5c518;letter-spacing:1px;line-height:1.1">${esc(teamName)}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap">
          <span class="badge ${tierBadgeClass}" style="font-size:10px;padding:2px 8px">TIER ${tier}</span>
          ${owner?`<span style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-muted)">Owned by</span><span style="cursor:pointer;display:flex;align-items:center;gap:5px" onclick="this.closest('.profile-overlay').remove();showPlayerProfile(${owner.id})">${logoSVG(owner.logo,20)}<span style="font-family:'Oswald',sans-serif;font-size:11px;color:#f5c518">${esc(owner.name)}</span></span>`:''}
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px">
      <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:10px;text-align:center"><div style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:#4ade80;line-height:1">${W}</div><div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-muted);letter-spacing:1px;margin-top:2px">WIN</div></div>
      <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:10px;text-align:center"><div style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:#f5c518;line-height:1">${D}</div><div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-muted);letter-spacing:1px;margin-top:2px">DRAW</div></div>
      <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:10px;text-align:center"><div style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:#f87171;line-height:1">${L}</div><div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-muted);letter-spacing:1px;margin-top:2px">LOSS</div></div>
      <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:10px;text-align:center"><div style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:var(--th-text);line-height:1">${GF}<span style="font-size:14px;color:var(--th-muted)">:${GA}</span></div><div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-muted);letter-spacing:1px;margin-top:2px">GF/GA</div></div>
    </div>
    ${recent.length?`<div style="margin-bottom:14px">
      <div style="font-family:'Anton',Impact,sans-serif;font-size:11px;letter-spacing:2px;color:#f5c518;margin-bottom:8px">Recent results</div>
      ${recent.map(m=>{
        const isHome=m.home===teamName;
        const my=isHome?m.hScore:m.aScore;
        const opp=isHome?m.aScore:m.hScore;
        const oppName=isHome?m.away:m.home;
        const oppFlag=isHome?m.awayF:m.homeF;
        const colour=my>opp?'#4ade80':my===opp?'#f5c518':'#f87171';
        const lbl=my>opp?'W':my===opp?'D':'L';
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--th-border-soft)"><span style="width:14px;text-align:center;font-family:'Anton',Impact,sans-serif;font-size:11px;color:${colour}">${lbl}</span><span style="font-family:'Oswald',sans-serif;font-size:13px;flex:1">${isHome?'vs':'@'} ${oppFlag} ${esc(oppName)}</span><span style="font-family:'Anton',Impact,sans-serif;font-size:14px;color:${colour}">${my}-${opp}</span></div>`;
      }).join('')}
    </div>`:''}
    ${upcoming.length?`<div style="margin-bottom:14px">
      <div style="font-family:'Anton',Impact,sans-serif;font-size:11px;letter-spacing:2px;color:#f5c518;margin-bottom:8px">Upcoming</div>
      ${upcoming.map(m=>{
        const isHome=m.home===teamName;
        const oppName=isHome?m.away:m.home;
        const oppFlag=isHome?m.awayF:m.homeF;
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--th-border-soft)"><span style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);min-width:110px">${fmtKO(m.kickoff)}</span><span style="font-family:'Oswald',sans-serif;font-size:13px;flex:1">${isHome?'vs':'@'} ${oppFlag} ${esc(oppName)}</span></div>`;
      }).join('')}
    </div>`:''}
    ${topScorers.length?`<div>
      <div style="font-family:'Anton',Impact,sans-serif;font-size:11px;letter-spacing:2px;color:#f5c518;margin-bottom:8px">Goal scorers in tournament</div>
      ${topScorers.map(([name,n])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid var(--th-border-soft);font-family:'Oswald',sans-serif;font-size:13px"><span>${esc(name)}</span><span style="color:#4ade80;font-weight:600">${n} ${n===1?'goal':'goals'}</span></div>`).join('')}
    </div>`:played.length>0?`<div style="font-family:'Oswald',sans-serif;font-size:12px;color:var(--th-muted);text-align:center;padding:8px">No goals tracked yet</div>`:''}
  </div>`;
  document.body.appendChild(overlay);
}

function render(){
  // SECURITY: validate that S.loggedIn index still points to the player whose PIN we authenticated with.
  // This prevents the catastrophic bug where a different person's account is shown.
  if(S.loggedIn!==null&&S.myPin&&S.players){
    const correctIdx=S.players.findIndex(p=>p.pin===S.myPin);
    if(correctIdx===-1){
      // PIN no longer matches any player — force logout
      console.warn('[security] logged-in PIN no longer matches any player. Logging out.');
      S.loggedIn=null;
      S.myPin=null;
      S.adminLoggedIn=false;
    } else if(correctIdx!==S.loggedIn){
      // Array order changed — fix the index silently
      console.warn(`[security] index ${S.loggedIn} corrected to ${correctIdx} for PIN match`);
      S.loggedIn=correctIdx;
    }
  } else if(S.loggedIn!==null&&!S.myPin){
    // Defensive: logged-in state but no PIN tracking — force logout
    console.warn('[security] loggedIn without myPin. Forcing logout.');
    S.loggedIn=null;
    S.adminLoggedIn=false;
  }
  const root=document.getElementById('root');
  if(!root)return;
  if(S.phase==='setup'){renderSetup(root);return;}
  if(S.phase==='draw'){renderDraw(root);return;}
  if(S.phase==='done'&&S.players){renderDone(root);return;}
}

async function validateLeaguePin(){
  const pin=(document.getElementById('lpin')?.value||'').trim().toUpperCase();
  const status=document.getElementById('lpin-status');
  if(!pin){if(status)status.textContent='Please enter a PIN.';return;}
  if(status)status.textContent='Checking...';
  // Always check Supabase directly — most reliable
  if(sb){
    try{
      const{data,error}=await sb.from('settings').select('value').eq('key','league_pin').single();
      if(data?.value&&pin===data.value.toUpperCase()){
        S.leaguePin=data.value;sv();
        S.onboardScreen='register';sv();render();return;
      }
      if(status)status.textContent='PIN not recognised. Check with your organiser.';
      return;
    }catch(e){
      if(status)status.textContent='Connection error. Try again.';
      return;
    }
  }
  // Fallback to local state
  if(!S.leaguePin){if(status)status.textContent='No league found. Try again shortly.';return;}
  if(pin!==S.leaguePin.toUpperCase()){if(status)status.textContent='PIN not recognised.';return;}
  S.onboardScreen='register';sv();render();
}

async function selfRegister(){
  const name=(document.getElementById('reg-name')?.value||'').trim();
  const team=(document.getElementById('reg-team')?.value||'').trim();
  const pin=(document.getElementById('reg-pin')?.value||'').trim();
  if(!name||!team||!pin||pin.length<4){alert('Please fill in all fields and use a 4-digit PIN.');return;}
  // Always fetch fresh registrations from Supabase
  let currentRegs=[];
  if(sb){
    try{
      const{data}=await sb.from('settings').select('value').eq('key','registrations').single();
      if(data?.value)currentRegs=JSON.parse(data.value)||[];
    }catch(e){currentRegs=S.registrations||[];}
  } else {
    currentRegs=S.registrations||[];
  }
  if(currentRegs.some(r=>r.name.toLowerCase()===name.toLowerCase())){
    alert(`${name} is already registered. If that's you, go back and log in with your PIN.`);return;
  }
  if(currentRegs.some(r=>r.pin===pin)){
    alert('That PIN is already taken. Please choose a different 4-digit PIN.');return;
  }
  const reg={name,teamName:team,pin};
  const newRegs=[...currentRegs,reg];
  S.registrations=newRegs;
  if(sb){
    try{
      await sb.from('settings').upsert({key:'registrations',value:JSON.stringify(newRegs)});
    }catch(e){}
  }
  sv();
  S.onboardScreen='waiting';sv();render();
}

function removeReg(idx){
  S.registrations=(S.registrations||[]).filter((_,i)=>i!==idx);
  if(sb){sb.from('settings').upsert({key:'registrations',value:JSON.stringify(S.registrations)}).then(()=>{});}
  sv();render();
}

async function loadLeagueDirectory(){
  const el=document.getElementById('league-list');

  if(!sb){
    el.innerHTML=`<p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary)">Connecting...</p>`;
    setTimeout(loadLeagueDirectory,800);return;

  try{
    const{data,error}=await sb.from('leagues').select('*').order('created_at',{ascending:false});

async function deleteLeague(id,pin){
  if(!confirm(`Delete league with PIN ${pin}? This cannot be undone.`))return;
  if(!sb)return;
  try{
    await sb.from('leagues').delete().eq('id',id);
    await sb.from('settings').delete().eq('key','league_pin');
    await sb.from('settings').delete().eq('key','registrations');
    // Reload directory
    loadLeagueDirectory();
  }catch(e){alert('Delete failed.');}
}

function useLeague(pin){
  S.leaguePin=pin;sv();
  S.onboardScreen='waiting-admin';sv();render();
}

function createLeague(){
  const pinEl=document.getElementById('new-league-pin');
  const nameEl=document.getElementById('new-league-name');
  const pin=(pinEl?.value||'').trim().toUpperCase();
  const name=(nameEl?.value||'').trim()||`League ${pin}`;
  if(!pin||pin.length<3){alert('Please enter a league PIN of at least 3 characters.');return;}
  S.leaguePin=pin;
  S.registrations=[];
  if(sb){
    sb.from('leagues').upsert({name,pin},{onConflict:'pin'}).then(()=>{});
    sb.from('settings').upsert({key:'league_pin',value:pin}).then(()=>{});
    sb.from('settings').delete().eq('key','registrations').then(()=>{});
  }
  sv();
  S.onboardScreen='waiting-admin';sv();render();
}

async function soloLogin(){
  const pin=(document.getElementById('solo-pin-inp')?.value||'').trim();
  const btn=document.getElementById('solo-login-btn');
  const status=document.getElementById('login-gate-status');
  if(!pin)return;
  if(btn)btn.textContent='Checking...';
  if(status)status.textContent='';
  // If players loaded locally, try local first
  if(S.players){
    const idx=S.players.findIndex(p=>p.pin===pin);
    if(idx>=0){
      S.loggedIn=idx;
      S.myPin=pin;
      S.phase='done';
      if(S.players[idx].theme)applyTheme(S.players[idx].theme);
      sv();render();return;
    }
  }
  // Try Supabase directly
  if(sb){
    try{
      const{data,error}=await sb.from('players').select('*').eq('pin',pin).limit(1);
      if(!error&&data&&data.length>0){
        await loadPlayersFromSB();
        const idx=S.players?.findIndex(p=>p.pin===pin)??-1;
        if(idx>=0){
          S.loggedIn=idx;
          S.myPin=pin;
          S.phase='done';
          if(S.players[idx].theme)applyTheme(S.players[idx].theme);
          sv();render();return;
        }
      }
    }catch(e){console.warn('Supabase PIN lookup failed',e);}
  }
  if(btn)btn.textContent='Log In →';
  if(status)status.textContent='PIN not recognised. Check with your organiser.';
  else alert('PIN not recognised. Check with your organiser.');
}

function adminGate(screen){
  const pin=(document.getElementById('admin-pin-inp')?.value||'').trim();
  if(!pin)return;
  if(pin!==S.adminPin){alert('Wrong admin PIN.');return;}

  if(screen==='admin-gate-create'){S.onboardScreen='create';}
  else if(screen==='admin-gate-draw'){S.onboardScreen='setup';}
  sv();render();
}

function getLiveBanner(){
  if(!S.matches)return '';
  const now=Date.now();
  // Find any match currently live. Prefer API status; otherwise show any match that
  // has kicked off within the last 2.5 hours and isn't confirmed finished.
  const candidates=S.matches.filter(m=>{
    if(!m.kickoff)return false;
    if(isMatchOver(m))return false;
    if(m.statusShort)return['1H','2H','ET','BT','HT','P','LIVE','SUSP','INT'].includes(m.statusShort);
    const kickoff=new Date(m.kickoff).getTime();
    const elapsed=now-kickoff;
    return elapsed>=0&&elapsed<150*60*1000;
  });
  // Prefer the most recently kicked-off match (most likely the active one)
  candidates.sort((a,b)=>new Date(b.kickoff)-new Date(a.kickoff));
  const live=candidates[0];
  if(!live)return '';
  // Try API-Football clock first, fall back to a cautious approximation that never says FT/AET
  let displayMin=fmtGameMin(live);
  if(!displayMin){
    const elapsedMin=Math.floor((now-new Date(live.kickoff).getTime())/60000);
    if(elapsedMin<=45)displayMin=`${elapsedMin}'`;
    else if(elapsedMin<=60)displayMin='HT?';
    else if(elapsedMin<=105)displayMin=`${elapsedMin-15}'`;
    else displayMin='LIVE'; // don't guess FT/AET without API confirmation
  }
  const bannerScore=live.hScore!=null?`${live.hScore}-${live.aScore}`:'vs';

function showAllPredictions(matchId){

  const matchLocked=m.hScore!=null||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now());

    const pred=S.predictions?.[p.id]?.[m.id];
    return{p,pred};
  });
  // Sort: people who predicted first, then those who didn't
  rows.sort((a,b)=>{
    if(a.pred&&!b.pred)return -1;
    if(!a.pred&&b.pred)return 1;

function showLiveDetail(matchId){
  const m=S.matches.find(x=>String(x.id)===String(matchId));
  if(!m)return;
  const matchStart=new Date(m.kickoff).getTime();
  // Match goals: try match_id first, fall back to team-name + time-window matching
  const matchGoals=(S.goals||[]).filter(g=>{
    const t=canonicalTeam(g.team);
    if(t!==m.home&&t!==m.away)return false;
    // Hard match: if both IDs known, they must match
    if(g.match_id!=null&&matchId!=null&&String(g.match_id)===String(matchId))return true;
    // Soft match: goal scored after this match's kickoff (within 3hr window)
    if(g.created_at){
      const gt=new Date(g.created_at).getTime();
      if(gt>=matchStart&&gt<=matchStart+3*60*60*1000)return true;
    }
    // Last resort: g.match_id explicitly mismatches → exclude; otherwise include
    return g.match_id==null;

function generateDailyDigest(){
  // Called by poll.js daily at 23:59
  // Returns the digest message to post to group chat
  if(!S.matches||!S.players)return null;
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Europe/London'});
  const todayMatches=S.matches.filter(m=>m.kickoff&&new Date(m.kickoff).toLocaleDateString('en-CA',{timeZone:'Europe/London'})===today);
  const finishedToday=todayMatches.filter(m=>m.hScore!=null);
  const totalGoals=finishedToday.reduce((sum,m)=>(m.hScore||0)+(m.aScore||0)+sum,0);
  // Get leaderboard deltas
  const sorted=[...S.players].sort((a,b)=>{
    const totA=a.matchPts+a.scorerPts,totB=b.matchPts+b.scorerPts;
    return totB-totA;
  });
  const topGainer=sorted[0];
  const bottomPlayer=sorted[sorted.length-1];
  // Next day's matches
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=tomorrow.toLocaleDateString('en-CA',{timeZone:'Europe/London'});
  const tomorrowMatches=S.matches.filter(m=>m.kickoff&&new Date(m.kickoff).toLocaleDateString('en-CA',{timeZone:'Europe/London'})===tomorrowStr&&m.hScore==null).length;
  const pts=topGainer?.matchPts+topGainer?.scorerPts||0;
  const bPts=bottomPlayer?.matchPts+bottomPlayer?.scorerPts||0;
  return `📊 Today's Recap — ${finishedToday.length} match${finishedToday.length!==1?'es':''}, ${totalGoals} goal${totalGoals!==1?'s':''}. ⬆️ ${esc(topGainer?.name||'?')} +${pts}pts, ⬇️ ${esc(bottomPlayer?.name||'?')} ${bPts}pts. Tomorrow: ${tomorrowMatches} match${tomorrowMatches!==1?'es':''}.\n[digest:${today}]`;
}

function getBreakdown(p){
  // W/D/L per tier from match results
  const bd={A:{W:0,D:0,L:0},B:{W:0,D:0,L:0},C:{W:0,D:0,L:0}};
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    p.teams.forEach(t=>{
      const isHome=t.n===m.home,isAway=t.n===m.away;
      if(!isHome&&!isAway)return;
      const tier=t.tier;
      const won=(isHome&&m.hScore>m.aScore)||(isAway&&m.aScore>m.hScore);
      const drew=m.hScore===m.aScore;
      if(won)bd[tier].W++;else if(drew)bd[tier].D++;else bd[tier].L++;
    });
  });
  return bd;
}
const getTierBreakdown=getBreakdown;

    const time=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});

    const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    if(d.toLocaleDateString('en-CA',{timeZone:'Europe/London'})===tomorrow.toLocaleDateString('en-CA',{timeZone:'Europe/London'}))return `Tomorrow · ${time}`;
    return d.toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  };
  const renderMatch=(m,isPast=false)=>{

        ${isPast&&myPred?`<span style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1px;color:${predCorrect?'#4ade80':predResult?'#f5c518':'#94afd4'}">${predCorrect?`✓ +4pts`:predResult?`✓ +2pts`:`Predicted ${myPred.h}-${myPred.a}`}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center">
          <div style="font-size:32px;line-height:1">${m.homeF}</div>
          <div style="cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:var(--th-text);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="showTeamProfile('${esc(m.home)}')" title="View ${esc(m.home)}">${esc(m.home)}</div>
          ${hO?`<div style="cursor:pointer;margin-top:1px" onclick="showPlayerProfile(${hO.id})" title="${esc(hO.name)}">${logoSVG(hO.logo,18)}</div>`:''}
        </div>
        <div style="font-family:'Anton',Impact,sans-serif;font-size:16px;color:${hasScore?'#f5c518':'var(--th-secondary)'};min-width:44px;text-align:center">
          ${hasScore?`${m.hScore}-${m.aScore}`:'vs'}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center">
          <div style="font-size:32px;line-height:1">${m.awayF}</div>
          <div style="cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:var(--th-text);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="showTeamProfile('${esc(m.away)}')" title="View ${esc(m.away)}">${esc(m.away)}</div>
          ${aO?`<div style="cursor:pointer;margin-top:1px" onclick="showPlayerProfile(${aO.id})" title="${esc(aO.name)}">${logoSVG(aO.logo,18)}</div>`:''}
        </div>
      </div>
      ${hO||aO?`<div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-muted);text-align:center;letter-spacing:.5px">${hO?esc(hO.name):''}${hO&&aO?' vs ':''} ${aO?esc(aO.name):''}</div>`:''}
      ${!hasScore&&myPred?(()=>{const locked=new Date(m.kickoff).getTime()<=Date.now();return`<div style="font-family:'Oswald',sans-serif;font-size:11px;color:#4ade80;text-align:center;margin-top:4px;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:6px"><span>My prediction: <span style="font-weight:600">${myPred.h}-${myPred.a}</span></span>${locked?`<span title="Locked — game has started" style="color:#94afd4">🔒</span>`:`<button onclick="editPrediction('${m.id}')" title="Edit prediction" style="background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.4);color:#f5c518;font-size:10px;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:.5px">✎ Edit</button>`}</div>`})():''}
      ${!hasScore&&!myPred&&pid!=null?(()=>{const locked=new Date(m.kickoff).getTime()<=Date.now();return locked?`<div style="text-align:center;margin-top:6px;font-family:'Oswald',sans-serif;font-size:11px;color:#94afd4">🔒 No prediction made</div>`:`<div style="text-align:center;margin-top:6px"><button class="btn-sm" onclick="editPrediction('${m.id}')" style="font-size:10px;padding:3px 10px">Predict</button></div>`})():''}

  </div>`;

  const upcomingHtml=upcoming.length?`<div class="mcard" style="margin-bottom:12px">
    <div class="card-head">📅 Upcoming</div>

  const pastHtml=past.length?`<details style="margin-bottom:8px">
    <summary style="cursor:pointer;font-family:'Anton',Impact,sans-serif;font-size:13px;letter-spacing:2px;color:#5a7ab4;padding:8px 14px;background:rgba(0,0,0,.15);border-radius:6px">📋 Past results (${past.length}) — tap to expand</summary>
    <div class="mcard" style="margin-top:6px;max-height:380px;overflow-y:auto">
      ${past.map(m=>renderMatch(m,true)).join('')}

  return `${toggleHtml}${liveHtml}${upcomingHtml}${pastHtml}`;
}

function renderTable(){
  if(S.loggedIn===null&&!isAdmin())return renderLoginGate('Log in to view the leaderboard.');
  const adv=S.leaderboardAdv||false;
  // Build tier breakdowns once and use for tiebreaker
  const playerStats=S.players.map(p=>{
    const bd=getTierBreakdown(p);
    const aPts=bd.A.W*S.rules.A.W+bd.A.D*S.rules.A.D;
    const bPts=bd.B.W*S.rules.B.W+bd.B.D*S.rules.B.D;
    const cPts=bd.C.W*S.rules.C.W+bd.C.D*S.rules.C.D;
    const total=p.matchPts+p.scorerPts;
    const tierPtsTotal=aPts+bPts+cPts||1;
    return{p,bd,total,aPts,bPts,cPts,cShare:cPts/tierPtsTotal,bShare:bPts/tierPtsTotal};
  });
  playerStats.sort((a,b)=>{
    if(b.total!==a.total)return b.total-a.total;
    if(b.cShare!==a.cShare)return b.cShare-a.cShare;
    return b.bShare-a.bShare;
  });
  const toggleHtml=`<div style="display:flex;align-items:center;gap:6px;padding:10px 14px;background:rgba(0,0,0,.15);border-radius:8px;margin-bottom:12px">
    <button class="pat-btn ${!adv?'on':''}" onclick="setLeaderboardView(false)" style="flex:1">Simple</button>
    <button class="pat-btn ${adv?'on':''}" onclick="setLeaderboardView(true)" style="flex:1">Advanced</button>
  </div>`;
  // Compute position change vs yesterday's snapshot
  const yesterdaySnap=getYesterdayLeaderboardSnap();
  const totalPlayers=playerStats.length;
  const rankClass=(i)=>{
    if(i===0)return 'rank-1-card';
    if(i===1)return 'rank-2-card';
    if(i===2)return 'rank-3-card';
    if(i===totalPlayers-1)return 'rank-last-card';
    return '';
  };
  const posChange=(name,curIdx)=>{
    const prev=yesterdaySnap?.findIndex(n=>n===name);
    if(prev===undefined||prev===-1||prev===curIdx)return `<span style="color:var(--th-secondary);font-size:10px;letter-spacing:1px">—</span>`;
    if(prev>curIdx)return `<span style="color:#4ade80;font-size:11px;letter-spacing:.5px" title="Climbed ${prev-curIdx} place${prev-curIdx>1?'s':''}">▲${prev-curIdx}</span>`;
    return `<span style="color:#f87171;font-size:11px;letter-spacing:.5px" title="Dropped ${curIdx-prev} place${curIdx-prev>1?'s':''}">▼${curIdx-prev}</span>`;
  };
  const fire=(p)=>p.streak>=3?`<span class="on-fire" title="On fire! ${p.streak} wins in a row">🔥</span>`:'';
  const formDots=(p)=>{
    const results=(p.lastResults||[]).slice(-5);
    if(!results.length)return '';
    const dot=r=>{
      const c=r.r==='W'?'#4ade80':r.r==='D'?'#f5c518':'#f87171';
      const lbl=r.r==='W'?`W vs ${r.opponent||''} ${r.score||''}`:r.r==='D'?'Draw':'Loss';
      return `<span title="${esc(lbl)}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:3px"></span>`;
    };
    // Pad with grey dots if less than 5
    const padding=5-results.length;
    let html='';
    for(let i=0;i<padding;i++)html+='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);margin-right:3px"></span>';
    return `<span style="display:inline-flex;align-items:center;margin-left:6px">${html}${results.map(dot).join('')}</span>`;
  };
  if(!adv){
    const rows=playerStats.map((s,i)=>{
      const p=s.p;
      const isMe=p.id===S.loggedIn;
      return `<div class="${rankClass(i)} ${isMe?'me-row':''}" style="display:flex;align-items:center;gap:10px;padding:11px 12px;${i>0?'border-top:1px solid var(--th-border-soft)':''}">
        <div style="display:flex;flex-direction:column;align-items:center;min-width:30px">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:16px;color:#f5c518;line-height:1">${i+1}</div>
          <div style="margin-top:1px">${posChange(p.name,i)}</div>
        </div>
        <div style="flex-shrink:0;cursor:pointer" onclick="showPlayerProfile(${p.id})">${logoSVG(p.logo,38)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:14px;color:#f5c518;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px">${esc(p.teamName)} ${fire(p)}${isMe?'<span class="me-pill">YOU</span>':''}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center">${esc(p.name)}${formDots(p)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="tick-up" style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:#f5c518;line-height:1" data-val="${s.total}">${s.total}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px;margin-top:1px">PTS</div>
        </div>
      </div>`;
    }).join('');
    // Snapshot today's order so tomorrow we can compute change
    saveTodayLeaderboardSnap(playerStats.map(s=>s.p.name));
    return `${toggleHtml}<div class="mcard">${rows}</div>`;
  }
  // ADVANCED VIEW
  const rows=playerStats.map((s,i)=>{
    const p=s.p;
    const bd=s.bd;
    const isMe=p.id===S.loggedIn;
    return `<div class="${rankClass(i)} ${isMe?'me-row':''}" style="padding:12px 14px;${i>0?'border-top:1px solid var(--th-border-soft)':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="display:flex;flex-direction:column;align-items:center;min-width:30px">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:16px;color:#f5c518;line-height:1">${i+1}</div>
          <div style="margin-top:1px">${posChange(p.name,i)}</div>
        </div>
        <div style="flex-shrink:0;cursor:pointer" onclick="showPlayerProfile(${p.id})">${logoSVG(p.logo,38)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:14px;color:#f5c518;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px">${esc(p.teamName)} ${fire(p)}${isMe?'<span class="me-pill">YOU</span>':''}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center">${esc(p.name)}${formDots(p)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="tick-up" style="font-family:'Anton',Impact,sans-serif;font-size:22px;color:#f5c518;line-height:1">${s.total}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px;margin-top:1px">PTS</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-muted)">
        <div style="background:rgba(245,197,24,.06);padding:5px 8px;border-radius:4px;border-left:2px solid #f5c518"><span style="color:#f5c518;font-weight:600">A</span> ${bd.A.W}W ${bd.A.D}D ${bd.A.L}L · <b style="color:var(--th-text)">${s.aPts}p</b></div>
        <div style="background:rgba(148,175,212,.06);padding:5px 8px;border-radius:4px;border-left:2px solid #94afd4"><span style="color:#94afd4;font-weight:600">B</span> ${bd.B.W}W ${bd.B.D}D ${bd.B.L}L · <b style="color:var(--th-text)">${s.bPts}p</b></div>
        <div style="background:rgba(143,206,90,.06);padding:5px 8px;border-radius:4px;border-left:2px solid #8fce5a"><span style="color:#8fce5a;font-weight:600">C</span> ${bd.C.W}W ${bd.C.D}D ${bd.C.L}L · <b style="color:var(--th-text)">${s.cPts}p</b></div>
      </div>
      ${p.scorerPts>0?`<div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-muted);margin-top:6px">⚽ Scorer points: <span style="color:#4ade80;font-weight:600">${p.scorerPts}</span></div>`:''}
    </div>`;
  }).join('');
  // Snapshot today's order for both simple and advanced views
  saveTodayLeaderboardSnap(playerStats.map(s=>s.p.name));
  return `${toggleHtml}<div class="mcard">${rows}</div>`;
}

// ===== POSITION CHANGE SNAPSHOTS =====
function getYesterdayLeaderboardSnap(){
  try{
    const snaps=JSON.parse(localStorage.getItem('wc26x_lb_snaps')||'[]');
    const today=new Date().toLocaleDateString('en-CA');
    // Find most recent snapshot not from today
    for(let i=snaps.length-1;i>=0;i--){
      if(snaps[i].date!==today)return snaps[i].order;
    }
    return null;
  }catch(e){return null;}
}
function saveTodayLeaderboardSnap(orderedNames){
  try{
    const today=new Date().toLocaleDateString('en-CA');
    let snaps=[];
    try{snaps=JSON.parse(localStorage.getItem('wc26x_lb_snaps')||'[]');}catch(e){}
    // Replace today's snapshot or push
    const todayIdx=snaps.findIndex(s=>s.date===today);
    if(todayIdx>=0)snaps[todayIdx].order=orderedNames;
    else snaps.push({date:today,order:orderedNames});
    if(snaps.length>14)snaps=snaps.slice(-14);
    localStorage.setItem('wc26x_lb_snaps',JSON.stringify(snaps));
  }catch(e){}
}

function renderGroups(){
  const ownerView=S.groupOwnerView||false;
  const ownerMap={};
  if(S.players) S.players.forEach(p=>(p.teams||[]).forEach(t=>{ownerMap[t.n]=p;}));
  // Build standings from S.matches (apply canonicalTeam as defense in depth)
  const standing={};
  S.matches.forEach(m=>{
    if(m.hScore==null)return;
    const h=canonicalTeam(m.home),a=canonicalTeam(m.away);
    [h,a].forEach(n=>{if(!standing[n])standing[n]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    standing[h].p++;standing[a].p++;
    standing[h].gf+=m.hScore;standing[h].ga+=m.aScore;
    standing[a].gf+=m.aScore;standing[a].ga+=m.hScore;
    if(m.hScore>m.aScore){standing[h].w++;standing[h].pts+=3;standing[a].l++;}
    else if(m.hScore<m.aScore){standing[a].w++;standing[a].pts+=3;standing[h].l++;}
    else{standing[h].d++;standing[a].d++;standing[h].pts++;standing[a].pts++;}
  });
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);line-height:1.5">All 12 groups. Live from 11 June.</p>
    <div style="display:flex;gap:6px">
      <button class="pat-btn ${!ownerView?'on':''}" onclick="S.groupOwnerView=false;render()">Teams</button>

    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

    <div class="mcard">
