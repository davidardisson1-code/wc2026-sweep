      <div style="padding:0 12px">
        ${g.teams.slice().sort((a,b)=>{
          const sa=standing[a.n]||{pts:0,gf:0,ga:0};
          const sb=standing[b.n]||{pts:0,gf:0,ga:0};
          return sb.pts-sa.pts||(sb.gf-sb.ga)-(sa.gf-sa.ga);
        }).map((t,i)=>{
          const owner=ownerMap[t.n];
          const st=standing[t.n]||{p:0,w:0,d:0,l:0,pts:0};
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;${i>0?'border-top:1px solid rgba(30,58,128,.3)':''}">
            <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1">
              <span style="font-size:16px;line-height:1;flex-shrink:0">${t.f}</span>
              <div style="min-width:0">
                <span style="font-family:'Oswald',sans-serif;font-size:12px;color:${t.n.startsWith('TBD')?'var(--th-secondary)':'var(--th-text)'};font-style:${t.n.startsWith('TBD')?'italic':''};display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.n)}</span>
                ${ownerView&&owner?`<span style="font-family:'Oswald',sans-serif;font-size:10px;color:#f5c518">${esc(owner.name)}</span>`:''}
              </div>
              ${ownerView&&owner?`<div style="flex-shrink:0;margin-left:4px">${logoSVG(owner.logo,18)}</div>`:''}
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:8px">
              <span style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary)" title="Played-Win-Draw-Loss · GF:GA">${st.p}P · ${st.w}-${st.d}-${st.l}</span>
              <span style="font-family:'Anton',Impact,sans-serif;font-size:13px;color:#f5c518">${st.pts}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

function renderBracket(){
  if(!S.matches.length)return `<div class="mcard"><div class="card-head">🏆 Knockout Bracket</div><div class="card-body"><p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted)">Bracket fixtures loading...</p></div></div>`;
  const koMatches=S.matches.filter(m=>{
    if(!m.kickoff)return false;
    const d=new Date(m.kickoff);
    // KO stage starts 28 June 2026 (group stage ends 27 June)
    return d>=new Date('2026-06-28T00:00:00Z');
  });
  const ownerMap={};
  if(S.players)S.players.forEach(p=>(p.teams||[]).forEach(t=>{ownerMap[t.n]=p;}));
  const matchCard=(m)=>{
    if(m._isTBCPlaceholder){
      return `<div style="background:rgba(0,0,0,.15);border:1px dashed var(--th-border-soft);border-radius:8px;padding:9px;min-width:180px;opacity:.6">
        <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px;margin-bottom:4px">TBC</div>
        <div style="display:flex;align-items:center;gap:6px;font-family:'Oswald',sans-serif;font-size:12px;color:var(--th-secondary)">
          <span style="font-size:16px">⚪</span>
          <span style="flex:1;font-style:italic">TBC</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;font-family:'Oswald',sans-serif;font-size:12px;color:var(--th-secondary)">
          <span style="font-size:16px">⚪</span>
          <span style="flex:1;font-style:italic">TBC</span>
        </div>
      </div>`;
    }
    const hO=ownerMap[m.home],aO=ownerMap[m.away];
    const isFinished=isMatchOver(m);
    const ko=new Date(m.kickoff);
    const isLocked=isFinished||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now());
    // Group stage runs through 26 Jun. Until it finishes, ALL knockout matches show TBC
    // regardless of what API-Football has written (it often pre-populates placeholder names
    // from previous cycles or third-party assumptions).
    const groupStageOver=Date.now()>=new Date('2026-06-27T00:00:00Z').getTime();
    const explicitTBD=!m.home||!m.away||/^(TBD|Winner|Runner-up|Loser|3rd Place)/i.test((m.home||'').trim())||/^(TBD|Winner|Runner-up|Loser|3rd Place)/i.test((m.away||'').trim());
    const isTBD=explicitTBD||!groupStageOver;
    const myKoPicks=S.loggedIn!=null?(S.koPredictions?.[S.loggedIn]||{}):{};
    const myPick=myKoPicks['match_'+m.id];
    const actualWinner=isFinished?(m.hScore>m.aScore?m.home:m.aScore>m.hScore?m.away:'DRAW'):null;
    const pickResult=myPick&&actualWinner?(myPick===actualWinner?'correct':actualWinner==='DRAW'?'draw':'wrong'):null;
    return `<div style="background:rgba(0,0,0,.3);border:1px solid var(--th-border-soft);border-radius:8px;padding:9px;min-width:180px;${isFinished?'border-color:#f5c518':''}">
      <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px;margin-bottom:4px">${isTBD?'TBC':`${ko.toLocaleDateString('en-GB',{day:'numeric',month:'short',timeZone:'Europe/London'})} ${ko.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'})}`}</div>
      <div style="display:flex;align-items:center;gap:6px;font-family:'Oswald',sans-serif;font-size:12px;${isFinished&&m.hScore>m.aScore?'font-weight:700;color:#f5c518':isFinished?'color:var(--th-secondary)':''}">
        <span style="font-size:16px">${isTBD?'⚪':(m.homeF||'⚪')}</span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${isTBD?'font-style:italic;color:var(--th-secondary)':''}">${isTBD?'TBC':esc(m.home)}</span>
        ${!isTBD&&hO?`<span style="cursor:pointer" onclick="showPlayerProfile(${hO.id})">${logoSVG(hO.logo,16)}</span>`:''}
        ${!isTBD&&isFinished?`<span style="font-family:'Anton',Impact,sans-serif;font-size:13px">${m.hScore}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px;font-family:'Oswald',sans-serif;font-size:12px;${isFinished&&m.aScore>m.hScore?'font-weight:700;color:#f5c518':isFinished?'color:var(--th-secondary)':''}">
        <span style="font-size:16px">${isTBD?'⚪':(m.awayF||'⚪')}</span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${isTBD?'font-style:italic;color:var(--th-secondary)':''}">${isTBD?'TBC':esc(m.away)}</span>
        ${!isTBD&&aO?`<span style="cursor:pointer" onclick="showPlayerProfile(${aO.id})">${logoSVG(aO.logo,16)}</span>`:''}
        ${!isTBD&&isFinished?`<span style="font-family:'Anton',Impact,sans-serif;font-size:13px">${m.aScore}</span>`:''}
      </div>
      ${S.loggedIn!=null&&!isTBD?`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--th-border-soft)">
        ${(()=>{
          const myPred=S.predictions?.[S.loggedIn]?.[m.id];
          const matchLocked=isFinished||(m.kickoff&&new Date(m.kickoff).getTime()<=Date.now());
          if(matchLocked){
            // Show pred result vs actual
            if(myPred){
              const exact=isFinished&&myPred.h===m.hScore&&myPred.a===m.aScore;
              const result=isFinished&&!exact&&Math.sign(myPred.h-myPred.a)===Math.sign(m.hScore-m.aScore);
              const c=exact?'#4ade80':result?'#f5c518':isFinished?'#f87171':'var(--th-muted)';
              return `<div style="font-family:'Oswald',sans-serif;font-size:10px;color:${c};letter-spacing:1px">YOUR PRED: ${myPred.h}-${myPred.a}${exact?' ✓ +4':result?' ✓ +2':isFinished?' ✗':''}</div>`;
            }
            return `<div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-muted);letter-spacing:1px">🔒 No prediction</div>`;
          }
          return `<div style="display:flex;align-items:center;gap:4px;justify-content:center">
            <span style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-muted);letter-spacing:1px">PREDICT:</span>
            <button onclick="editPrediction('${m.id}')" style="background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.4);color:#f5c518;font-family:'Oswald',sans-serif;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer">${myPred?`${myPred.h}-${myPred.a} ✎`:'+ Score'}</button>
          </div>`;
        })()}
      </div>`:''}
    </div>`;
  };
  const stageOf=(m)=>{
    // Trust date over API label — API-Football mislabels early KO rounds as "Round of 16"
    // when they're actually Round of 32 (48-team format: top 2 + 8 best 3rds = 32 advance).
    // Official 2026 schedule:
    //   R32: 28 Jun – 3 Jul  | R16: 4 – 7 Jul  | QF: 9 – 11 Jul
    //   SF: 14 – 15 Jul       | 3rd: 18 Jul     | F: 19 Jul
    const d=new Date(m.kickoff);
    if(d<new Date('2026-07-04T00:00:00Z'))return 'Round of 32';
    if(d<new Date('2026-07-08T00:00:00Z'))return 'Round of 16';
    if(d<new Date('2026-07-12T00:00:00Z'))return 'Quarter-finals';
    if(d<new Date('2026-07-16T00:00:00Z'))return 'Semi-finals';
    if(d<new Date('2026-07-19T00:00:00Z'))return '3rd Place Final';
    return 'Final';
  };
  const stages=['Round of 32','Round of 16','Quarter-finals','Semi-finals','3rd Place Final','Final'];
  const expectedCounts={'Round of 32':16,'Round of 16':8,'Quarter-finals':4,'Semi-finals':2,'3rd Place Final':1,'Final':1};
  const byStage={};
  koMatches.forEach(m=>{const s=stageOf(m);(byStage[s]=byStage[s]||[]).push(m);});
  // Pad each stage with TBC placeholder matches up to expected count
  stages.forEach(s=>{
    if(!byStage[s])byStage[s]=[];
    const need=expectedCounts[s]-byStage[s].length;
    for(let i=0;i<need;i++){
      byStage[s].push({
        id:`tbc-${s}-${i}`,
        home:null,away:null,
        homeF:'',awayF:'',
        kickoff:null,
        hScore:null,aScore:null,
        _isTBCPlaceholder:true
      });
    }
  });
  Object.values(byStage).forEach(arr=>arr.sort((a,b)=>{
    // Real matches (with kickoff) sorted first by kickoff; TBC at the end
    if(a._isTBCPlaceholder&&!b._isTBCPlaceholder)return 1;
    if(!a._isTBCPlaceholder&&b._isTBCPlaceholder)return -1;
    if(a._isTBCPlaceholder&&b._isTBCPlaceholder)return 0;
    return new Date(a.kickoff)-new Date(b.kickoff);
  }));
  const stagesHtml=stages.filter(s=>byStage[s]?.length).map(s=>`
    <div class="mcard" style="margin-bottom:12px">
      <div class="card-head" style="font-size:13px;padding:8px 12px">${s} <span style="font-size:10px;font-weight:400;color:var(--th-secondary);letter-spacing:1px;margin-left:6px">${byStage[s].length} match${byStage[s].length>1?'es':''}</span></div>
      <div style="padding:10px;display:flex;flex-wrap:wrap;gap:8px">
        ${byStage[s].map(matchCard).join('')}
      </div>
    </div>
  `).join('');
  const koPredCard=renderKoPredictions();
  return `<div>
    <p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted);line-height:1.5;margin-bottom:14px">Knockout fixtures fill in as the group stage completes.</p>
    ${koPredCard}
    ${stagesHtml||`<div class="mcard"><div class="card-body"><p style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-muted)">No knockout matches scheduled yet — group stage runs first.</p></div></div>`}
  </div>`;
}

function renderKoPredictions(){
  if(S.loggedIn===null)return '';
  const pid=S.loggedIn;
  const me=S.players?.[pid];if(!me)return '';
  const koPreds=S.koPredictions?.[pid]||{};
  const firstKo=S.matches.find(m=>{
    if(m.stage==='Round of 16'||m.round==='Round of 16')return true;
    const d=new Date(m.kickoff);
    return d>=new Date('2026-06-27')&&d<new Date('2026-07-04');
  });
  const locked=firstKo&&new Date(firstKo.kickoff).getTime()<=Date.now();
  const allTeams=[...new Set(S.matches.flatMap(m=>[m.home,m.away]).filter(n=>n&&!n.startsWith('TBD')))];
  const slots=[
    {key:'champ',label:'🏆 Tournament Winner'},
    {key:'runner',label:'🥈 Runner-up'},
    {key:'third',label:'🥉 Third place'},
    {key:'topScorer',label:'⚽ Golden Boot scorer',isText:true}
  ];
  return `<div class="mcard" style="margin-bottom:14px">
    <div class="card-head">🔮 Your Bracket Predictions ${locked?'<span style="font-size:10px;color:var(--th-muted);font-weight:400;letter-spacing:1px;margin-left:6px">🔒 LOCKED</span>':'<span style="font-size:10px;color:#4ade80;font-weight:400;letter-spacing:1px;margin-left:6px">LOCKS WHEN R16 STARTS</span>'}</div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
      <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-muted);margin-bottom:4px;line-height:1.5">Just for fun — these don't count toward the leaderboard. Score predictions for R16+ matches happen on each match card.</div>
      ${slots.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-text)">${s.label}</div>
        ${locked?`<div style="font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518">${esc(koPreds[s.key]||'—')}</div>`:s.isText?
          `<input type="text" id="kopred_${s.key}" value="${esc(koPreds[s.key]||'')}" placeholder="Player name" oninput="saveKoPred('${s.key}',this.value)" style="background:rgba(0,0,0,.3);border:1px solid var(--th-border-soft);border-radius:6px;color:var(--th-text);font-family:'Oswald',sans-serif;font-size:12px;padding:6px 10px;width:160px">`:
          `<select onchange="saveKoPred('${s.key}',this.value)" style="background:rgba(0,0,0,.3);border:1px solid var(--th-border-soft);border-radius:6px;color:var(--th-text);font-family:'Oswald',sans-serif;font-size:12px;padding:6px 10px;width:170px">
            <option value="">— pick —</option>
            ${allTeams.sort().map(t=>`<option ${koPreds[s.key]===t?'selected':''}>${esc(t)}</option>`).join('')}
          </select>`}
      </div>`).join('')}
    </div>
  </div>`;
}

function saveKoPred(key,value){
  if(S.loggedIn===null)return;
  const pid=S.loggedIn;
  if(!S.koPredictions)S.koPredictions={};
  if(!S.koPredictions[pid])S.koPredictions[pid]={};
  S.koPredictions[pid][key]=value;
  sv();
  if(sb&&S.players?.[pid]){
    sb.from('settings').upsert({key:'ko_pred_'+S.players[pid].name,value:JSON.stringify(S.koPredictions[pid])}).then(()=>{}).catch(()=>{});
  }
}

function clearPred(pid,mid){

    const p=S.players[pid];
    if(p)sb.from('predictions').delete().eq('player_name',p.name).eq('match_id',mid).then(()=>{});
  }
  render();
}

function renderPredTable(){
  if(!S.players)return '';
  // Enrich with extra insight stats per player
  const enriched=S.players.map(p=>{
    const t=getPredTotal(p.id);
    const myPreds=S.predictions?.[p.id]||{};
    const entries=Object.entries(myPreds);
    let settled=0,hotStreak=0,currentStreak=0,upsetsCalled=0;
    // Process chronologically by kickoff
    const settledOrdered=entries.map(([mid,pred])=>{
      const m=S.matches?.find(mch=>mch.id===mid||mch.id===+mid);
      if(!m||!isMatchOver(m))return null;
      return{mid,pred,m};
    }).filter(Boolean).sort((a,b)=>new Date(a.m.kickoff)-new Date(b.m.kickoff));
    settled=settledOrdered.length;
    settledOrdered.forEach(({pred,m})=>{
      const exact=pred.h===m.hScore&&pred.a===m.aScore;
      const result=Math.sign(pred.h-pred.a)===Math.sign(m.hScore-m.aScore);
      const hit=exact||result;
      if(hit){currentStreak++;hotStreak=Math.max(hotStreak,currentStreak);}else{currentStreak=0;}
      // Upset call: predicted a non-draw, the result was a different non-draw winner — skip. Real upset: predicted Tier C team to win, and they did.
      // Simpler upset: result vs expected — we don't know expected, so just count exact-score predictions on matches with clear underdog wins (margin 2+ for an away team named in lower tiers). Skip for now, just track exact + result.
    });
    const acc=settled>0?Math.round(((t.correct+t.result)/settled)*100):0;
    return{...p,...t,settled,hotStreak,currentStreak,acc};
  }).sort((a,b)=>b.total-a.total);
  // Find player with hottest streak for badge
  const maxHot=Math.max(...enriched.map(p=>p.hotStreak));
  const hottestId=maxHot>=3?enriched.find(p=>p.hotStreak===maxHot)?.id:null;
  // Most accurate (must have >=3 settled)
  const eligibleAcc=enriched.filter(p=>p.settled>=3);
  const topAccPct=eligibleAcc.length?Math.max(...eligibleAcc.map(p=>p.acc)):0;
  const mostAccurateId=topAccPct>0?eligibleAcc.find(p=>p.acc===topAccPct)?.id:null;
  return `<div class="mcard">${enriched.map((p,i)=>{
    const badges=[];
    if(p.id===hottestId)badges.push(`<span title="Hot streak: ${p.hotStreak} predictions correct in a row" style="background:linear-gradient(90deg,#f87171,#f5c518);color:#0a0e1a;font-family:'Anton',Impact,sans-serif;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px">🔥 ${p.hotStreak}</span>`);
    if(p.id===mostAccurateId)badges.push(`<span title="Best accuracy: ${p.acc}%" style="background:#4ade80;color:#0a0e1a;font-family:'Anton',Impact,sans-serif;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px">🎯 ${p.acc}%</span>`);
    if(p.currentStreak>=2&&p.id!==hottestId)badges.push(`<span title="${p.currentStreak} correct in a row right now" style="background:rgba(245,197,24,.18);color:#f5c518;border:1px solid rgba(245,197,24,.4);font-family:'Anton',Impact,sans-serif;font-size:9px;letter-spacing:1px;padding:1px 5px;border-radius:3px">×${p.currentStreak}</span>`);
    return `
    <div style="display:flex;gap:10px;padding:11px 14px;${i>0?'border-top:1px solid var(--th-border-soft)':''}align-items:center">
      <div style="flex-shrink:0;text-align:center;min-width:22px">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:14px;color:#f5c518">${i+1}</div>
      </div>
      <div style="flex-shrink:0;cursor:pointer" onclick="showPlayerProfile(${p.id})">${logoSVG(p.logo,40)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:16px;letter-spacing:1px;color:#f5c518;line-height:1.1;display:flex;align-items:center;gap:5px;flex-wrap:wrap">${esc(p.teamName)}${badges.length?'<span style="display:inline-flex;gap:4px">'+badges.join('')+'</span>':''}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);margin-top:1px">${esc(p.name)} · ${p.settled} graded · ${p.acc}%</div>
      </div>
      <div style="flex-shrink:0;display:flex;gap:14px;align-items:center">
        <div style="text-align:center">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#4ade80">${p.correct}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">SCORE</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:18px;color:#f5c518">${p.result}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">RESULT</div>
        </div>
        <div style="text-align:center;min-width:32px">
          <div style="font-family:'Anton',Impact,sans-serif;font-size:26px;color:#f5c518;line-height:1">${p.total}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:9px;color:var(--th-secondary);letter-spacing:1px">PTS</div>
        </div>
      </div>
    </div>`;}).join('')}</div>`;
}

let searchTimer=null;
async function searchPlayers(pid,kind,query,tierCFilter=''){
  upPick(pid,kind,query);
  const drop=document.getElementById(`drop_${kind}_${pid}`);
  if(!drop)return;
  if(!query||query.length<1){drop.style.display='none';return;}
  clearTimeout(searchTimer);
  searchTimer=setTimeout(async()=>{
    if(!sb){drop.innerHTML=`<div style="padding:12px;font-family:'Oswald',sans-serif;font-size:12px;color:#fff">Connecting...</div>`;drop.style.display='block';return;}
    try{
      let q=sb.from('squads').select('player_name,team_name,position').ilike('player_name',`%${query}%`).limit(40);
      if(tierCFilter){
        const teams=tierCFilter.split('|').filter(Boolean);
        if(teams.length)q=q.in('team_name',teams);
      }
      const{data,error}=await q;
      if(error){console.error('Search error:',error);drop.innerHTML=`<div style="padding:12px;font-family:'Oswald',sans-serif;font-size:12px;color:#f87171">Error: ${error.message}</div>`;drop.style.display='block';return;}
      if(!data||!data.length){
        drop.innerHTML=`<div style="padding:12px;font-family:'Oswald',sans-serif;font-size:12px;color:#94afd4">No matching players${tierCFilter?' in your Tier C nations':''}</div>`;
        drop.style.display='block';return;
      }
      drop.innerHTML=data.map(p=>`<div onmousedown="selectPick(${pid},'${kind}','${esc(p.player_name).replace(/'/g,"\\'")}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(245,197,24,.15);font-family:'Oswald',sans-serif" onmouseover="this.style.background='rgba(245,197,24,.15)'" onmouseout="this.style.background='transparent'">
        <div style="color:#fff;font-size:14px;font-weight:600">${esc(p.player_name)}</div>
        <div style="font-size:11px;color:#94afd4;margin-top:2px">${esc(p.team_name)}${p.position?` · ${esc(p.position)}`:''}</div>
      </div>`).join('');
      drop.style.display='block';
    }catch(e){console.error('search exception',e);drop.innerHTML=`<div style="padding:12px;color:#f87171">Error loading players</div>`;drop.style.display='block';}
  },150);
}

function renderGoldenBoot(){
  if(!S.players)return '';
  // Build goal counts per scorer pick by querying local goals
  const standings=S.players.map(p=>{
    const reg=p.picks?.reg||'';
    const tierC=p.picks?.tierC||'';
    const regGoals=reg?(S.goals||[]).filter(g=>namesMatch(reg,g.player_name)).length:0;
    const tierCGoals=tierC?(S.goals||[]).filter(g=>namesMatch(tierC,g.player_name)).length:0;
    const regPts=regGoals*S.rules.sReg;
    const tierCPts=tierCGoals*S.rules.sTierC;
    return{...p,regGoals,tierCGoals,total:regPts+tierCPts};
  }).sort((a,b)=>b.total-a.total);
  return `<div class="mcard"><div class="card-head">⚽ Golden Boot Leaderboard</div>

        <div style="font-family:'Anton',Impact,sans-serif;font-size:15px;letter-spacing:1px;color:#f5c518;line-height:1.1">${esc(p.teamName)}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);margin-top:1px">${esc(p.name)}</div>

function renderTodaysFixtures(){
  if(!S.matches.length||!S.players)return '';
  const now=Date.now();
  const fiveDays=5*24*60*60*1000;
  const upcoming=S.matches.filter(m=>{
    if(!m.kickoff)return false;
    const ko=new Date(m.kickoff).getTime();
    return ko>=now-(3*60*60*1000)&&ko<=now+fiveDays;
  }).slice(0,8);
  if(!upcoming.length)return '';
  const ownerMap={};
  S.players.forEach(p=>(p.teams||[]).forEach(t=>{ownerMap[t.n]=p;}));
  const fmtKO=ko=>{
    const d=new Date(ko);
    const today=new Date().toLocaleDateString('en-CA',{timeZone:'Europe/London'});
    const matchDate=d.toLocaleDateString('en-CA',{timeZone:'Europe/London'});
    const time=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
    if(today===matchDate)return `Today · ${time}`;
    return d.toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  };
  return `<div class="mcard" style="margin-bottom:14px"><div class="card-head">📅 Upcoming Fixtures</div>
    ${upcoming.map((m,i)=>{
      const hO=ownerMap[m.home];const aO=ownerMap[m.away];
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;${i>0?'border-top:1px solid var(--th-border-soft)':''}">
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-secondary);min-width:100px;letter-spacing:1px">${fmtKO(m.kickoff)}</div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-align:center">
            <div style="font-size:28px;line-height:1">${m.homeF}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--th-text);overflow:hidden;text-overflow:ellipsis;max-width:90px">${esc(m.home)}</div>
            ${hO?`<div style="cursor:pointer;margin-top:2px" onclick="showPlayerProfile(${hO.id})" title="${esc(hO.name)}">${logoSVG(hO.logo,20)}</div>`:'<div style="height:20px"></div>'}
          </div>
          <span style="font-family:'Anton',Impact,sans-serif;font-size:13px;color:var(--th-secondary);flex-shrink:0">${m.hScore!=null?`${m.hScore}-${m.aScore}`:'vs'}</span>

let chatMessages=[];
let chatSub=null;
let S_chatConvo='group';

// Use S for persistent unread counts
function getChatUnread(){try{return JSON.parse(localStorage.getItem('wc26x_unread'))||{};}catch(e){return{};}}
function addUnread(key){const u=getChatUnread();u[key]=(u[key]||0)+1;try{localStorage.setItem('wc26x_unread',JSON.stringify(u));}catch(e){}}
function clearUnread(key){const u=getChatUnread();u[key]=0;try{localStorage.setItem('wc26x_unread',JSON.stringify(u));}catch(e){}}
function clearAllUnread(){try{localStorage.setItem('wc26x_unread','{}');}catch(e){}}
function totalUnread(){return Object.values(getChatUnread()).reduce((a,b)=>a+b,0);}

async function initChat(){
  if(!sb)return;
  try{
    const{data}=await sb.from('messages').select('*').order('created_at',{ascending:true}).limit(200);
    if(data)chatMessages=data;
    // If chat tab is already open, render the messages now they've loaded
    if(S.tab==='chat') renderChatPanel();
    if(!chatSub){
      chatSub=sb.channel('chat-live')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
          chatMessages.push(payload.new);
          const m=payload.new;
          const myName=S.players?.[S.loggedIn]?.name;
          const ismine=m.player_name===myName;
          if(!ismine){
            const matchId=getMatchThreadId(m);
            let key;
            if(matchId)key=`match_${matchId}`;
            else if(m.to_player)key=`dm_${m.player_name}`;
            else key='group';
            const activeKey=S_chatConvo==='group'?'group':S_chatConvo.startsWith('match:')?`match_${S_chatConvo.slice(6)}`:`dm_${S_chatConvo}`;
            if(S.tab!=='chat'||activeKey!==key){
              addUnread(key);
              const btn=document.getElementById('chat-tab-btn');
              if(btn){btn.innerHTML='Chat <span style="color:#f87171;font-size:14px">●</span>';btn.style.color='#f87171';}
            }
            const notifTitle=matchId?'🏟️ Match thread':m.to_player?`💬 DM from ${m.player_name}`:`💬 ${m.player_name} in Group Chat`;
            fireNotif(
              notifTitle,
              stripMatchTag(m.message).length>80?stripMatchTag(m.message).substring(0,80)+'...':stripMatchTag(m.message)
            );
            if(S.tab==='chat'){
              const badge=document.getElementById(`unread_${key}`);
              if(badge){const u=getChatUnread()[key]||0;badge.style.display=u>0?'flex':'none';badge.textContent=u;}
              const preview=document.getElementById(`preview_${key}`);
              if(preview){preview.textContent=stripMatchTag(m.message).substring(0,30)+(stripMatchTag(m.message).length>30?'..':'');preview.style.color='#f87171';}
            }
          }
          if(S.tab==='chat') renderChatPanel();
        }).subscribe();
    }
  }catch(e){console.warn('Chat init failed',e);}
}

// Match thread messages are namespaced with a [#match:ID] prefix inside the message body.
// This keeps them in the regular messages table (to_player=null) but lets us filter them.
const MATCH_THREAD_RE=/^\[#match:([^\]]+)\]\s?/;
function isMatchThreadMsg(m){return !m.to_player && MATCH_THREAD_RE.test(m.message||'');}
function getMatchThreadId(m){const x=(m.message||'').match(MATCH_THREAD_RE);return x?x[1]:null;}
function stripMatchTag(text){
  // Strip all hidden marker tags used for dedup/routing: [#match:X], [ref:X:Y], [goal:X], [taunt:X], [digest:X]
  return (text||'')
    .replace(MATCH_THREAD_RE,'')
    .replace(/\s*\[ref:[^\]]+\]/g,'')
    .replace(/\s*\[goal:[^\]]+\]/g,'')
    .replace(/\s*\[taunt:[^\]]+\]/g,'')
    .replace(/\s*\[digest:[^\]]+\]/g,'')
    .trim();
}
function getActiveMatchThreads(){
  // Find all match IDs that have at least one message
  const ids=new Set();
  (chatMessages||[]).forEach(m=>{const id=getMatchThreadId(m);if(id)ids.add(id);});
  return Array.from(ids).map(id=>{
    const match=S.matches?.find(x=>String(x.id)===String(id));
    const lastMsg=chatMessages.filter(m=>getMatchThreadId(m)===id).pop();
    return{id,match,lastMsg};
  }).sort((a,b)=>new Date(b.lastMsg?.created_at||0)-new Date(a.lastMsg?.created_at||0));
}
function getConvoMessages(convo,myName){
  if(convo==='group') return chatMessages.filter(m=>!m.to_player&&!isMatchThreadMsg(m));
  if(convo&&convo.startsWith('match:')){
    const mid=convo.slice(6);
    return chatMessages.filter(m=>!m.to_player&&getMatchThreadId(m)===mid);
  }
  return chatMessages.filter(m=>
    (m.player_name===myName&&m.to_player===convo)||
    (m.player_name===convo&&m.to_player===myName)
  );
}

function discussMatch(mid){
  if(S.loggedIn===null){alert('Log in to join match discussion.');return;}
  S_chatConvo='match:'+mid;
  S.tab='chat';
  sv();render();
}

    const mine=!isBot&&m.player_name===myName;
    const t=new Date(m.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
    if(isBot) return`<div style="text-align:center;margin:8px 0">
      <div style="display:inline-block;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.2);border-radius:8px;padding:8px 14px;font-family:'Oswald',sans-serif;font-size:13px;color:#f5c518;line-height:1.5;max-width:90%;text-align:left;white-space:pre-line">${esc(stripMatchTag(m.message))}</div>
      <div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary);margin-top:2px">${t}</div>
    </div>`;
    return`<div style="display:flex;flex-direction:column;${mine?'align-items:flex-end':'align-items:flex-start'};margin-bottom:10px">
      <div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--th-secondary);margin-bottom:3px">${mine?'You':esc(m.player_name)} · ${t}</div>
      <div style="max-width:80%;padding:9px 13px;border-radius:${mine?'14px 14px 2px 14px':'14px 14px 14px 2px'};background:${mine?'#f5c518':'rgba(30,58,128,.7)'};color:${mine?'#07122a':'var(--th-text)'};font-family:'Oswald',sans-serif;font-size:14px;line-height:1.45;word-break:break-word">${esc(stripMatchTag(m.message))}</div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:30px 0;font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary)">No messages yet. Say hello!</div>`;
  box.scrollTop=box.scrollHeight;
}

async function sendChat(){
  if(!sb||S.loggedIn===null)return;
  const inp=document.getElementById('chat-inp');
  if(!inp||!inp.value.trim())return;
  const p=S.players[S.loggedIn];
  let msg=inp.value.trim();inp.value='';
  let toPlayer=null;
  if(S_chatConvo==='group'){toPlayer=null;}
  else if(S_chatConvo&&S_chatConvo.startsWith('match:')){
    toPlayer=null;
    msg=`[#match:${S_chatConvo.slice(6)}] ${msg}`;
  }
  else{toPlayer=S_chatConvo;}
  const payload={player_name:p.name,message:msg,to_player:toPlayer};
  try{await sb.from('messages').insert(payload);}catch(e){console.warn('send failed',e);}
}

function selectConvo(convo){
  S_chatConvo=convo;
  const key=convo==='group'?'group':`dm_${convo}`;
  if(chatUnread[key]){unreadTotal-=chatUnread[key];chatUnread[key]=0;}
  renderChat(S.players?.[S.loggedIn]);
  // Re-render the chat content inline
  const chatArea=document.getElementById('chat-area');
  if(chatArea) chatArea.innerHTML=buildChatArea();
  setTimeout(()=>{renderChatPanel();},0);
}

function buildChatArea(){
  const loggedIn=S.loggedIn!=null;
  const myName=S.players?.[S.loggedIn]?.name||'';
  let title=`💬 ${esc(S_chatConvo)}`;
  if(S_chatConvo==='group')title='💬 Group Chat';
  else if(S_chatConvo&&S_chatConvo.startsWith('match:')){
    const mid=S_chatConvo.slice(6);
    const m=S.matches?.find(x=>String(x.id)===String(mid));
    if(m){
      const score=m.hScore!=null?` · ${m.hScore}-${m.aScore}${isMatchOver(m)?' FT':' LIVE'}`:'';
      title=`🏟️ ${m.homeF||''} ${esc(m.home)} vs ${esc(m.away)} ${m.awayF||''}${score}`;
    } else title='🏟️ Match thread';
  }
  return`<div style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div style="padding:10px 14px;border-bottom:1px solid var(--th-border);font-family:'Anton',Impact,sans-serif;font-size:13px;letter-spacing:1px;color:#f5c518;flex-shrink:0">
      ${title}
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:14px"></div>
    ${loggedIn?`<div style="padding:10px;border-top:1px solid var(--th-border);display:flex;gap:8px;flex-shrink:0">
      <input id="chat-inp" type="text" placeholder="Message..." style="flex:1;font-size:14px;padding:9px 12px" oninput="clearUnread(S_chatConvo==='group'?'group':'dm_'+S_chatConvo)" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn-sm" onclick="sendChat()" style="font-size:13px">Send</button>
    </div>`:`<div style="padding:14px;text-align:center;font-family:'Oswald',sans-serif;font-size:13px;color:var(--th-secondary)">Log in to send messages</div>`}
  </div>`;
}

function renderChat(p){
  const myName=p?.name||'';
  const others=(S.players||[]).filter(pl=>pl.name!==myName);
  const matchThreads=getActiveMatchThreads();
  const convos=[
    {key:'group',label:'Group Chat',sub:'Everyone',icon:'💬'},
    ...others.map(pl=>({key:pl.name,label:esc(pl.name),sub:esc(pl.teamName),icon:'',logo:pl.logo})),
    ...matchThreads.map(t=>{
      const m=t.match;
      const label=m?`${m.homeF||''} ${esc(m.home||'?')} vs ${esc(m.away||'?')} ${m.awayF||''}`:`Match ${t.id}`;
      const sub=m?(m.hScore!=null?`${m.hScore}-${m.aScore}${isMatchOver(m)?' FT':' LIVE'}`:new Date(m.kickoff).toLocaleDateString('en-GB',{day:'numeric',month:'short',timeZone:'Europe/London'})):'';
      return{key:'match:'+t.id,label,sub,icon:'🏟️'};
    })
  ];
  const sidebar=convos.map(c=>{
    const idKey=c.key==='group'?'group':c.key.startsWith('match:')?`match_${c.key.slice(6)}`:`dm_${c.key}`;
    const unreads=(getChatUnread()[idKey])||0;
    const active=S_chatConvo===c.key;
    const convMsgs=getConvoMessages(c.key,myName);
    const lastMsg=convMsgs[convMsgs.length-1];
    const previewText=lastMsg?stripMatchTag(lastMsg.message):'';
    const preview=previewText?previewText.substring(0,32)+(previewText.length>32?'..':''):'';
    return`<div onclick="S_chatConvo='${c.key}';clearUnread('${idKey}');document.getElementById('chat-area').innerHTML=buildChatArea();setTimeout(renderChatPanel,0);document.querySelectorAll('.convo-btn').forEach(b=>{b.classList.remove('on');b.style.background='transparent';});this.classList.add('on');this.style.background='rgba(245,197,24,.08)';" class="convo-btn ${active?'on':''}" style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--th-border-soft);background:${active?'rgba(245,197,24,.08)':unreads>0?'rgba(248,113,113,.08)':'transparent'};transition:background .15s">
      ${c.logo?`<div style="flex-shrink:0">${logoSVG(c.logo,28)}</div>`:`<span style="font-size:20px;flex-shrink:0">${c.icon}</span>`}
      <div style="flex:1;min-width:0">
        <div style="font-family:'Anton',Impact,sans-serif;font-size:12px;letter-spacing:.5px;color:${unreads>0&&!active?'#f87171':active?'#f5c518':'var(--th-text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.label}</div>
        <div id="preview_${idKey}" style="font-family:'Oswald',sans-serif;font-size:10px;color:${unreads>0&&!active?'#f87171':'var(--th-secondary)'};font-weight:${unreads>0&&!active?'600':'400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">${preview||c.sub}</div>
      </div>
      <span id="unread_${idKey}" style="display:${unreads>0?'flex':'none'};background:#f87171;color:#fff;border-radius:10px;min-width:20px;height:20px;padding:0 5px;align-items:center;justify-content:center;font-family:'Anton',Impact,sans-serif;font-size:11px;flex-shrink:0">${unreads||''}</span>
    </div>`;
  }).join('');

  const html=`<div style="display:flex;height:500px;border-radius:8px;overflow:hidden;border:2px solid var(--th-border)">
    <div style="width:160px;flex-shrink:0;border-right:1px solid var(--th-border);overflow-y:auto;background:var(--th-sb)">${sidebar}</div>
    <div id="chat-area" style="flex:1;display:flex;flex-direction:column;min-width:0;background:var(--th-sa)">${buildChatArea()}</div>
  </div>`;
  setTimeout(renderChatPanel,0);
  return html;
}

init();
</script>
</body>
</html>
